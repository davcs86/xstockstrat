version: '3.9'

# xstockstrat-orchestration — Local Development Docker Compose
# Usage: docker compose up -d

networks:
  xstockstrat:
    driver: bridge

volumes:
  timescaledb_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: xstockstrat-db
    environment:
      POSTGRES_USER: xstockstrat
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: xstockstrat
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/home/postgres/pgdata/data
    networks:
      - xstockstrat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xstockstrat"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Config Service (must start before all others) ───────────────────────
  xstockstrat-config:
    build:
      context: ./services/xstockstrat-config
      dockerfile: Dockerfile
    container_name: xstockstrat-config
    environment:
      GRPC_PORT: "50060"
      HTTP_PORT: "8060"
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
    ports:
      - "50060:50060"
      - "8060:8060"
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # ── Ledger Service ──────────────────────────────────────────────────────
  xstockstrat-ledger:
    build:
      context: ./services/xstockstrat-ledger
      dockerfile: Dockerfile
    container_name: xstockstrat-ledger
    environment:
      GRPC_PORT: "50057"
      HTTP_PORT: "8057"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
    ports:
      - "50057:50057"
      - "8057:8057"
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
      xstockstrat-config:
        condition: service_started
    restart: unless-stopped

  # ── Identity Service ────────────────────────────────────────────────────
  xstockstrat-identity:
    build:
      context: ./services/xstockstrat-identity
      dockerfile: Dockerfile
    container_name: xstockstrat-identity
    environment:
      GRPC_PORT: "50058"
      HTTP_PORT: "8058"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-production
    ports:
      - "50058:50058"
      - "8058:8058"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-ledger
    restart: unless-stopped

  # ── Notify Service ──────────────────────────────────────────────────────
  xstockstrat-notify:
    build:
      context: ./services/xstockstrat-notify
      dockerfile: Dockerfile
    container_name: xstockstrat-notify
    environment:
      GRPC_PORT: "50059"
      HTTP_PORT: "8059"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
    ports:
      - "50059:50059"
      - "8059:8059"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-ledger
    restart: unless-stopped

  # ── MarketData Service (sole Alpaca integration point) ──────────────────
  xstockstrat-marketdata:
    build:
      context: ./services/xstockstrat-marketdata
      dockerfile: Dockerfile
    container_name: xstockstrat-marketdata
    environment:
      GRPC_PORT: "50053"
      HTTP_PORT: "8053"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
      ALPACA_API_KEY: ${ALPACA_API_KEY:-your-api-key}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-your-api-secret}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_DATA_URL: https://data.alpaca.markets
      ALPACA_PAPER: "true"
    ports:
      - "50053:50053"
      - "8053:8053"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-ledger
      - xstockstrat-notify
    restart: unless-stopped

  # ── Indicators Service ──────────────────────────────────────────────────
  xstockstrat-indicators:
    build:
      context: ./services/xstockstrat-indicators
      dockerfile: Dockerfile
    container_name: xstockstrat-indicators
    environment:
      GRPC_PORT: "50054"
      HTTP_PORT: "8054"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
    ports:
      - "50054:50054"
      - "8054:8054"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-ledger
    restart: unless-stopped

  # ── Ingest Service ──────────────────────────────────────────────────────
  xstockstrat-ingest:
    build:
      context: ./services/xstockstrat-ingest
      dockerfile: Dockerfile
    container_name: xstockstrat-ingest
    environment:
      GRPC_PORT: "50055"
      HTTP_PORT: "8055"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
    ports:
      - "50055:50055"
      - "8055:8055"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-marketdata
      - xstockstrat-ledger
    restart: unless-stopped

  # ── Analysis Service ────────────────────────────────────────────────────
  xstockstrat-analysis:
    build:
      context: ./services/xstockstrat-analysis
      dockerfile: Dockerfile
    container_name: xstockstrat-analysis
    environment:
      GRPC_PORT: "50056"
      HTTP_PORT: "8056"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
    ports:
      - "50056:50056"
      - "8056:8056"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-marketdata
      - xstockstrat-indicators
      - xstockstrat-ledger
    restart: unless-stopped

  # ── Portfolio Service ───────────────────────────────────────────────────
  xstockstrat-portfolio:
    build:
      context: ./services/xstockstrat-portfolio
      dockerfile: Dockerfile
    container_name: xstockstrat-portfolio
    environment:
      GRPC_PORT: "50052"
      HTTP_PORT: "8052"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
    ports:
      - "50052:50052"
      - "8052:8052"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-ledger
      - xstockstrat-marketdata
    restart: unless-stopped

  # ── Trading Service ─────────────────────────────────────────────────────
  xstockstrat-trading:
    build:
      context: ./services/xstockstrat-trading
      dockerfile: Dockerfile
    container_name: xstockstrat-trading
    environment:
      GRPC_PORT: "50051"
      HTTP_PORT: "8051"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      PORTFOLIO_ENDPOINT: xstockstrat-portfolio:50052
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: postgres://xstockstrat:devpassword@timescaledb:5432/xstockstrat?sslmode=disable
    ports:
      - "50051:50051"
      - "8051:8051"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-ledger
      - xstockstrat-portfolio
      - xstockstrat-notify
      - xstockstrat-indicators
    restart: unless-stopped

  # ── Trader Frontend ─────────────────────────────────────────────────────
  xstockstrat-trader:
    build:
      context: ./services/xstockstrat-trader
      dockerfile: Dockerfile
    container_name: xstockstrat-trader
    environment:
      TRADING_ENDPOINT: xstockstrat-trading:50051
      PORTFOLIO_ENDPOINT: xstockstrat-portfolio:50052
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      IDENTITY_ENDPOINT: xstockstrat-identity:50058
    ports:
      - "3000:3000"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-trading
      - xstockstrat-portfolio
      - xstockstrat-notify
      - xstockstrat-identity
    restart: unless-stopped

  # ── Insights Frontend ───────────────────────────────────────────────────
  xstockstrat-insights:
    build:
      context: ./services/xstockstrat-insights
      dockerfile: Dockerfile
    container_name: xstockstrat-insights
    environment:
      ANALYSIS_ENDPOINT: xstockstrat-analysis:50056
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      IDENTITY_ENDPOINT: xstockstrat-identity:50058
    ports:
      - "3001:3001"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-analysis
      - xstockstrat-indicators
      - xstockstrat-marketdata
    restart: unless-stopped
