version: '3.9'

# xstockstrat-orchestration — Local Development Docker Compose
# Usage: docker compose up -d

networks:
  xstockstrat:
    driver: bridge

volumes:
  timescaledb_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────

  # OpenTelemetry Collector — central fan-out gateway for logs, metrics, traces.
  # All services push OTLP to this container; it forwards to Grafana Cloud.
  # Requires GRAFANA_OTLP_ENDPOINT and GRAFANA_OTLP_TOKEN in .env.
  # See packages/otel/otel-collector-config.yaml and
  #     _tasks/x-observability-otel-grafana.md for setup instructions.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: xstockstrat-otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    environment:
      GRAFANA_OTLP_ENDPOINT: ${GRAFANA_OTLP_ENDPOINT:-http://localhost:4317}
      GRAFANA_OTLP_TOKEN: ${GRAFANA_OTLP_TOKEN:-placeholder}
    volumes:
      - ./packages/otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "13133:13133" # Health check endpoint
    networks:
      - xstockstrat
    restart: unless-stopped

  # Required .env vars for this service: POSTGRES_PASSWORD, DATABASE_URL
  # Set these in .env (copy .env.example to .env). Never commit .env.
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: xstockstrat-db
    environment:
      POSTGRES_USER: xstockstrat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - copy .env.example to .env}
      POSTGRES_DB: xstockstrat
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/home/postgres/pgdata/data
    networks:
      - xstockstrat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xstockstrat"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── DB Migrator (one-shot: applies all pending migrations then exits) ────
  db-migrator:
    build:
      context: .
      dockerfile: scripts/Dockerfile.migrate
    container_name: xstockstrat-db-migrator
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
    volumes:
      - .:/repo
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  # ── Config Service (must start before all others) ─────────────────────
  xstockstrat-config:
    build:
      context: .
      dockerfile: services/xstockstrat-config/Dockerfile
    container_name: xstockstrat-config
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50060"
      HTTP_PORT: "8060"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-config
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50060:50060"
      - "8060:8060"
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Ledger Service ─────────────────────────────────────────────────────
  xstockstrat-ledger:
    build:
      context: .
      dockerfile: services/xstockstrat-ledger/Dockerfile
    container_name: xstockstrat-ledger
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50057"
      HTTP_PORT: "8057"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-ledger
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50057:50057"
      - "8057:8057"
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
    restart: unless-stopped

  # ── Identity Service ────────────────────────────────────────────────────
  xstockstrat-identity:
    build:
      context: .
      dockerfile: services/xstockstrat-identity/Dockerfile
    container_name: xstockstrat-identity
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50058"
      HTTP_PORT: "8058"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - copy .env.example to .env (run: openssl rand -hex 32)}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-identity
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50058:50058"
      - "8058:8058"
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started
    restart: unless-stopped

  # ── Notify Service ─────────────────────────────────────────────────────
  xstockstrat-notify:
    build:
      context: .
      dockerfile: services/xstockstrat-notify/Dockerfile
    container_name: xstockstrat-notify
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50059"
      HTTP_PORT: "8059"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-notify
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50059:50059"
      - "8059:8059"
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started
    restart: unless-stopped

  # ── MarketData Service (sole Alpaca integration point) ──────────────────
  xstockstrat-marketdata:
    build:
      context: ./services/xstockstrat-marketdata
      dockerfile: Dockerfile
    container_name: xstockstrat-marketdata
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50053"
      HTTP_PORT: "8053"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-your-api-key}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-your-api-secret}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_DATA_URL: https://data.alpaca.markets
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-marketdata
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50053:50053"
      - "8053:8053"
    networks:
      - xstockstrat
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started
      xstockstrat-notify:
        condition: service_started
    restart: unless-stopped

  # ── Indicators Service ──────────────────────────────────────────────────
  xstockstrat-indicators:
    build:
      context: ./services/xstockstrat-indicators
      dockerfile: Dockerfile
    container_name: xstockstrat-indicators
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50054"
      HTTP_PORT: "8054"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-indicators
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50054:50054"
      - "8054:8054"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-ledger
    restart: unless-stopped

  # ── Ingest Service ─────────────────────────────────────────────────────
  xstockstrat-ingest:
    build:
      context: ./services/xstockstrat-ingest
      dockerfile: Dockerfile
    container_name: xstockstrat-ingest
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50055"
      HTTP_PORT: "8055"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-ingest
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50055:50055"
      - "8055:8055"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-config
      - xstockstrat-marketdata
      - xstockstrat-ledger
    restart: unless-stopped

  # ── Analysis Service ────────────────────────────────────────────────────
  xstockstrat-analysis:
    build:
      context: ./services/xstockstrat-analysis
      dockerfile: Dockerfile
    container_name: xstockstrat-analysis
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50056"
      HTTP_PORT: "8056"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-analysis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50056:50056"
      - "8056:8056"
    networks:
      - xstockstrat
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
      xstockstrat-marketdata:
        condition: service_started
      xstockstrat-indicators:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started
    restart: unless-stopped

  # ── Portfolio Service ───────────────────────────────────────────────────
  xstockstrat-portfolio:
    build:
      context: ./services/xstockstrat-portfolio
      dockerfile: Dockerfile
    container_name: xstockstrat-portfolio
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50052"
      HTTP_PORT: "8052"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-portfolio
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50052:50052"
      - "8052:8052"
    networks:
      - xstockstrat
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started
      xstockstrat-marketdata:
        condition: service_started
    restart: unless-stopped

  # ── Trading Service ─────────────────────────────────────────────────────
  xstockstrat-trading:
    build:
      context: ./services/xstockstrat-trading
      dockerfile: Dockerfile
    container_name: xstockstrat-trading
    env_file: [".env.local"]
    environment:
      GRPC_PORT: "50051"
      HTTP_PORT: "8051"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      PORTFOLIO_ENDPOINT: xstockstrat-portfolio:50052
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-trading
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "50051:50051"
      - "8051:8051"
    networks:
      - xstockstrat
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started
      xstockstrat-portfolio:
        condition: service_started
      xstockstrat-notify:
        condition: service_started
      xstockstrat-indicators:
        condition: service_started
    restart: unless-stopped

  # ── Trader Frontend ─────────────────────────────────────────────────────
  xstockstrat-trader:
    build:
      context: ./services/xstockstrat-trader
      dockerfile: Dockerfile
    container_name: xstockstrat-trader
    env_file: [".env.local"]
    environment:
      # Connect-RPC HTTP endpoints (replaces raw gRPC endpoints)
      TRADING_HTTP_ENDPOINT: http://xstockstrat-trading:8051
      PORTFOLIO_HTTP_ENDPOINT: http://xstockstrat-portfolio:8052
      NOTIFY_HTTP_ENDPOINT: http://xstockstrat-notify:8059
      IDENTITY_HTTP_ENDPOINT: http://xstockstrat-identity:8058
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-trader
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "3000:3000"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-trading
      - xstockstrat-portfolio
      - xstockstrat-notify
      - xstockstrat-identity
    restart: unless-stopped

  # ── Insights Frontend ─────────────────────────────────────────────────────
  xstockstrat-insights:
    build:
      context: ./services/xstockstrat-insights
      dockerfile: Dockerfile
    container_name: xstockstrat-insights
    env_file: [".env.local"]
    environment:
      # Connect-RPC HTTP endpoints (replaces raw gRPC endpoints)
      ANALYSIS_HTTP_ENDPOINT: http://xstockstrat-analysis:8056
      INDICATORS_HTTP_ENDPOINT: http://xstockstrat-indicators:8054
      MARKETDATA_HTTP_ENDPOINT: http://xstockstrat-marketdata:8053
      NOTIFY_HTTP_ENDPOINT: http://xstockstrat-notify:8059
      IDENTITY_HTTP_ENDPOINT: http://xstockstrat-identity:8058
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-insights
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "3001:3001"
    networks:
      - xstockstrat
    depends_on:
      - xstockstrat-analysis
      - xstockstrat-indicators
      - xstockstrat-marketdata
    restart: unless-stopped

  # ── Config UI ───────────────────────────────────────────────────────────
  xstockstrat-config-ui:
    build:
      context: ./services/xstockstrat-config-ui
      dockerfile: Dockerfile
    container_name: xstockstrat-config-ui
    env_file: [".env.local"]
    environment:
      # Connect-RPC HTTP endpoint for xstockstrat-config
      CONFIG_ENDPOINT: http://xstockstrat-config:8060
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - copy .env.example to .env}
      TRADING_MODE: paper
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: xstockstrat-config-ui
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: environment=dev,trading_mode=paper
    ports:
      - "3002:3002"
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_started
    restart: unless-stopped
