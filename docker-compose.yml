# xstockstrat — Local Development Docker Compose
# Usage: docker compose up -d

networks:
  xstockstrat:
    driver: bridge

volumes:
  timescaledb_data:

# ── YAML Anchors ─────────────────────────────────────────────────────────────
#
# &common-env   Env vars injected into every application service via <<: *common-env.
#               Override per-service as needed — service-level keys take precedence.
x-common-env: &common-env
  APPLICATION_ENV: development
  TRADING_MODE: paper
  OTEL_ENABLED: ${OTEL_ENABLED:-false}

# &db-url       Constructed from POSTGRES_PASSWORD (set in .env) and the bridged-network
#               hostname. Merged into environment: for all services that use the DB.
x-db-url: &db-url
  DATABASE_URL: "postgres://xstockstrat:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - copy .env.example to .env}@timescaledb:5432/xstockstrat?sslmode=disable"

# &svc          Applied at the service level — every application container and the
#               otel-collector share the same network and restart policy.
x-svc: &svc
  networks:
    - xstockstrat
  restart: unless-stopped

# &hc-defaults  Common healthcheck timing merged into per-service healthcheck blocks.
#               Node.js (Alpine): test uses nc -z (busybox nc supports -z flag).
#               Python (Debian slim): test uses bash /dev/tcp (no nc in base image).
#               Go (distroless): no healthcheck — distroless has no shell or nc.
x-hc-defaults: &hc-defaults
  interval: 5s
  timeout: 3s
  retries: 12
  start_period: 5s

services:

  # ── Infrastructure ──────────────────────────────────────────────────────

  # OpenTelemetry Collector — central fan-out gateway for logs, metrics, traces.
  # All services push OTLP to this container; it forwards to Grafana Cloud.
  # OTEL_EXPORTER_OTLP_ENDPOINT: Grafana Cloud URL (e.g. https://otlp-gateway-<region>.grafana.net/otlp)
  # OTEL_EXPORTER_OTLP_HEADERS: Authorization header VALUE only — "Basic <base64(instanceId:apiKey)>"
  # Both default to no-ops; set real values in .env to enable forwarding.
  # See packages/otel/otel-collector-config.yaml and docs/setup/grafana-cloud.md.
  otel-collector:
    <<: *svc
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: xstockstrat-otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-https://placeholder.example.com}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-Basic placeholder}
    volumes:
      - ./packages/otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "13133:13133" # Health check endpoint

  # Required .env var: POSTGRES_PASSWORD (copy .env.example to .env). Never commit .env.
  # DATABASE_URL is constructed from POSTGRES_PASSWORD by docker-compose — no need to set it separately.
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: xstockstrat-db
    environment:
      POSTGRES_USER: xstockstrat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - copy .env.example to .env}
      POSTGRES_DB: xstockstrat
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/home/postgres/pgdata/data
    networks:
      - xstockstrat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xstockstrat"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── DB Migrator (one-shot: applies all pending migrations then exits) ────
  db-migrator:
    build:
      context: .
      dockerfile: scripts/Dockerfile.migrate
    container_name: xstockstrat-db-migrator
    environment:
      <<: *db-url
    volumes:
      - .:/repo
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  # ── Config Service (must start before all others) ───────────────────────
  xstockstrat-config:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-config/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-config:latest-dev
    container_name: xstockstrat-config
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50060"
      SERVICE_NAME: config
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50060:50060"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50060"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
  xstockstrat-ledger:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-ledger/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-ledger:latest-dev
    container_name: xstockstrat-ledger
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50057"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      WAIT_FOR: "xstockstrat-config:50060"
      SERVICE_NAME: ledger
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50057:50057"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "nc", "-z", "localhost", "50057"]
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy

  # ── Identity Service ────────────────────────────────────────────────────
  xstockstrat-identity:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-identity/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-identity:latest-dev
    container_name: xstockstrat-identity
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50058"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      WAIT_FOR: "xstockstrat-config:50060 xstockstrat-ledger:50057"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - copy .env.example to .env (run: openssl rand -hex 32)}"
      SERVICE_NAME: identity
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50058:50058"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "nc", "-z", "localhost", "50058"]
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy

  # ── Notify Service ──────────────────────────────────────────────────────
  xstockstrat-notify:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-notify/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-notify:latest-dev
    container_name: xstockstrat-notify
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50059"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      WAIT_FOR: "xstockstrat-config:50060 xstockstrat-ledger:50057"
      SERVICE_NAME: notify
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50059:50059"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "nc", "-z", "localhost", "50059"]
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy

  # ── MarketData Service (sole Alpaca integration point) ──────────────────
  xstockstrat-marketdata:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-marketdata/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-marketdata:latest-dev
    container_name: xstockstrat-marketdata
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50053"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      ALPACA_API_KEY: ${ALPACA_API_KEY:?ALPACA_API_KEY is required - set it in .env (see .env.example)}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:?ALPACA_API_SECRET is required - set it in .env (see .env.example)}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_DATA_URL: https://data.alpaca.markets
      SERVICE_NAME: marketdata
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50053:50053"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy
      xstockstrat-notify:
        condition: service_healthy

  # ── Indicators Service ──────────────────────────────────────────────────
  xstockstrat-indicators:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-indicators/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-indicators:latest-dev
    container_name: xstockstrat-indicators
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50054"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      WAIT_FOR: "xstockstrat-config:50060 xstockstrat-ledger:50057"
      SERVICE_NAME: indicators
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50054:50054"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/50054"]
    depends_on:
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully

  # ── Ingest Service ──────────────────────────────────────────────────────
  xstockstrat-ingest:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-ingest/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-ingest:latest-dev
    container_name: xstockstrat-ingest
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50055"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      IDENTITY_ENDPOINT: xstockstrat-identity:50058
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      WAIT_FOR: "xstockstrat-config:50060 xstockstrat-ledger:50057 xstockstrat-identity:50058"
      SERVICE_NAME: ingest
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50055:50055"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/50055"]
    depends_on:
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy
      xstockstrat-identity:
        condition: service_healthy
      xstockstrat-marketdata:
        condition: service_started

  # ── Analysis Service ────────────────────────────────────────────────────
  xstockstrat-analysis:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-analysis/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-analysis:latest-dev
    container_name: xstockstrat-analysis
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50056"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      INGEST_ENDPOINT: xstockstrat-ingest:50055
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      WAIT_FOR: "xstockstrat-config:50060 xstockstrat-ledger:50057 xstockstrat-indicators:50054"
      SERVICE_NAME: analysis
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50056:50056"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/50056"]
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy
      xstockstrat-indicators:
        condition: service_healthy
      xstockstrat-marketdata:
        condition: service_started

  # ── Portfolio Service ───────────────────────────────────────────────────
  xstockstrat-portfolio:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-portfolio/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-portfolio:latest-dev
    container_name: xstockstrat-portfolio
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50052"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      SERVICE_NAME: portfolio
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50052:50052"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy
      xstockstrat-marketdata:
        condition: service_started

  # ── Trading Service ─────────────────────────────────────────────────────
  xstockstrat-trading:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-trading/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-trading:latest-dev
    container_name: xstockstrat-trading
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50051"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      PORTFOLIO_ENDPOINT: xstockstrat-portfolio:50052
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      SERVICE_NAME: trading
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50051:50051"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_healthy
      xstockstrat-notify:
        condition: service_healthy
      xstockstrat-indicators:
        condition: service_healthy
      xstockstrat-portfolio:
        condition: service_started

  # ── Consolidated Frontend ───────────────────────────────────────────────
  xstockstrat-ui:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-ui/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-ui:latest-dev
    container_name: xstockstrat-ui
    env_file: [".env.local", ".env.fe.local"]
    environment:
      <<: [*common-env, *db-url]
      # gRPC endpoints (host:port, no protocol) — server-side only
      TRADING_ENDPOINT: xstockstrat-trading:50051
      PORTFOLIO_ENDPOINT: xstockstrat-portfolio:50052
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      IDENTITY_ENDPOINT: xstockstrat-identity:50058
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      ANALYSIS_ENDPOINT: xstockstrat-analysis:50056
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      CONFIG_ENDPOINT: xstockstrat-config:50060
      INGEST_ENDPOINT: xstockstrat-ingest:50055
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVICE_NAME: xstockstrat-ui
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-trading:
        condition: service_started
      xstockstrat-portfolio:
        condition: service_started
      xstockstrat-notify:
        condition: service_started
      xstockstrat-identity:
        condition: service_healthy
      xstockstrat-marketdata:
        condition: service_started
      xstockstrat-analysis:
        condition: service_started
      xstockstrat-config:
        condition: service_healthy

  # ── Agent MCP Server ────────────────────────────────────────────────────
  xstockstrat-agent:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-agent/Dockerfile
    image: ghcr.io/davcs86/xstockstrat/xstockstrat-agent:latest-dev
    container_name: xstockstrat-agent
    env_file: [".env.local"]
    environment:
      <<: *common-env
      INGEST_ENDPOINT: xstockstrat-ingest:50055
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      ANALYSIS_ENDPOINT: xstockstrat-analysis:50056
      IDENTITY_ENDPOINT: xstockstrat-identity:50058
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      CONFIG_ENDPOINT: xstockstrat-config:50060
      WAIT_FOR: "xstockstrat-config:50060 xstockstrat-identity:50058"
      MCP_TRANSPORT: sse
      MCP_SSE_PORT: "9000"
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
      UI_BASE_URL: http://localhost:3000
      AGENT_PUBLIC_URL: http://localhost:9000
    ports:
      - "9000:9000"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9000"]
    depends_on:
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-identity:
        condition: service_healthy
      xstockstrat-ingest:
        condition: service_healthy
      xstockstrat-notify:
        condition: service_healthy
      xstockstrat-analysis:
        condition: service_healthy
