version: '3.9'

# xstockstrat-orchestration — Local Development Docker Compose
# Usage: docker compose up -d

networks:
  xstockstrat:
    driver: bridge

volumes:
  timescaledb_data:

# ── YAML Anchors ─────────────────────────────────────────────────────────────
#
# &common-env   Env vars injected into every application service via <<: *common-env.
#               Override per-service as needed — service-level keys take precedence.
x-common-env: &common-env
  APPLICATION_ENV: development
  TRADING_MODE: paper
  OTEL_ENABLED: ${OTEL_ENABLED:-false}

# &db-url       Constructed from POSTGRES_PASSWORD (set in .env) and the bridged-network
#               hostname. Merged into environment: for all services that use the DB.
x-db-url: &db-url
  DATABASE_URL: "postgres://xstockstrat:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - copy .env.example to .env}@timescaledb:5432/xstockstrat?sslmode=disable"

# &svc          Applied at the service level — every application container and the
#               otel-collector share the same network and restart policy.
x-svc: &svc
  networks:
    - xstockstrat
  restart: unless-stopped

services:

  # ── Infrastructure ──────────────────────────────────────────────────────

  # OpenTelemetry Collector — central fan-out gateway for logs, metrics, traces.
  # All services push OTLP to this container; it forwards to Grafana Cloud.
  # OTEL_EXPORTER_OTLP_ENDPOINT: Grafana Cloud URL (e.g. https://otlp-gateway-<region>.grafana.net/otlp)
  # OTEL_EXPORTER_OTLP_HEADERS: Authorization header VALUE only — "Basic <base64(instanceId:apiKey)>"
  # Both default to no-ops; set real values in .env to enable forwarding.
  # See packages/otel/otel-collector-config.yaml and docs/setup/grafana-cloud.md.
  otel-collector:
    <<: *svc
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: xstockstrat-otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-https://placeholder.example.com}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-Basic placeholder}
    volumes:
      - ./packages/otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "13133:13133" # Health check endpoint

  # Required .env var: POSTGRES_PASSWORD (copy .env.example to .env). Never commit .env.
  # DATABASE_URL is constructed from POSTGRES_PASSWORD by docker-compose — no need to set it separately.
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: xstockstrat-db
    environment:
      POSTGRES_USER: xstockstrat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - copy .env.example to .env}
      POSTGRES_DB: xstockstrat
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/home/postgres/pgdata/data
    networks:
      - xstockstrat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xstockstrat"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── DB Migrator (one-shot: applies all pending migrations then exits) ────
  db-migrator:
    build:
      context: .
      dockerfile: scripts/Dockerfile.migrate
    container_name: xstockstrat-db-migrator
    environment:
      <<: *db-url
    volumes:
      - .:/repo
    networks:
      - xstockstrat
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  # ── Config Service (must start before all others) ───────────────────────
  xstockstrat-config:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-config/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-config:latest-dev
    container_name: xstockstrat-config
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50060"
      HTTP_PORT: "8060"
      SERVICE_NAME: config
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50060:50060"
      - "8060:8060"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8060/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5
  xstockstrat-ledger:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-ledger/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-ledger:latest-dev
    container_name: xstockstrat-ledger
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50057"
      HTTP_PORT: "8057"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      SERVICE_NAME: ledger
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50057:50057"
      - "8057:8057"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy

  # ── Identity Service ────────────────────────────────────────────────────
  xstockstrat-identity:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-identity/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-identity:latest-dev
    container_name: xstockstrat-identity
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50058"
      HTTP_PORT: "8058"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - copy .env.example to .env (run: openssl rand -hex 32)}"
      SERVICE_NAME: identity
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50058:50058"
      - "8058:8058"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_started

  # ── Notify Service ──────────────────────────────────────────────────────
  xstockstrat-notify:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-notify/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-notify:latest-dev
    container_name: xstockstrat-notify
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50059"
      HTTP_PORT: "8059"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      SERVICE_NAME: notify
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "50059:50059"
      - "8059:8059"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_started

  # ── MarketData Service (sole Alpaca integration point) ──────────────────
  xstockstrat-marketdata:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-marketdata/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-marketdata:latest-dev
    container_name: xstockstrat-marketdata
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50053"
      HTTP_PORT: "8053"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      ALPACA_API_KEY: ${ALPACA_API_KEY:?ALPACA_API_KEY is required - set it in .env (see .env.example)}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:?ALPACA_API_SECRET is required - set it in .env (see .env.example)}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_DATA_URL: https://data.alpaca.markets
      SERVICE_NAME: marketdata
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50053:50053"
      - "8053:8053"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_started
      xstockstrat-notify:
        condition: service_started

  # ── Indicators Service ──────────────────────────────────────────────────
  xstockstrat-indicators:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-indicators/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-indicators:latest-dev
    container_name: xstockstrat-indicators
    env_file: [".env.local"]
    environment:
      <<: *common-env
      GRPC_PORT: "50054"
      HTTP_PORT: "8054"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      SERVICE_NAME: indicators
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50054:50054"
      - "8054:8054"
    depends_on:
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_started

  # ── Ingest Service ──────────────────────────────────────────────────────
  xstockstrat-ingest:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-ingest/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-ingest:latest-dev
    container_name: xstockstrat-ingest
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50055"
      HTTP_PORT: "8055"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      IDENTITY_ENDPOINT: xstockstrat-identity:50058
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      SERVICE_NAME: ingest
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50055:50055"
      - "8055:8055"
    depends_on:
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-marketdata:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started

  # ── Analysis Service ────────────────────────────────────────────────────
  xstockstrat-analysis:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-analysis/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-analysis:latest-dev
    container_name: xstockstrat-analysis
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50056"
      HTTP_PORT: "8056"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      SERVICE_NAME: analysis
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50056:50056"
      - "8056:8056"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-marketdata:
        condition: service_started
      xstockstrat-indicators:
        condition: service_started
      xstockstrat-ledger:
        condition: service_started

  # ── Portfolio Service ───────────────────────────────────────────────────
  xstockstrat-portfolio:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-portfolio/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-portfolio:latest-dev
    container_name: xstockstrat-portfolio
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50052"
      HTTP_PORT: "8052"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      MARKETDATA_ENDPOINT: xstockstrat-marketdata:50053
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      SERVICE_NAME: portfolio
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50052:50052"
      - "8052:8052"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_started
      xstockstrat-marketdata:
        condition: service_started

  # ── Trading Service ─────────────────────────────────────────────────────
  xstockstrat-trading:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-trading/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-trading:latest-dev
    container_name: xstockstrat-trading
    env_file: [".env.local"]
    environment:
      <<: [*common-env, *db-url]
      GRPC_PORT: "50051"
      HTTP_PORT: "8051"
      CONFIG_ENDPOINT: xstockstrat-config:50060
      LEDGER_ENDPOINT: xstockstrat-ledger:50057
      PORTFOLIO_ENDPOINT: xstockstrat-portfolio:50052
      INDICATORS_ENDPOINT: xstockstrat-indicators:50054
      NOTIFY_ENDPOINT: xstockstrat-notify:50059
      SERVICE_NAME: trading
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "50051:50051"
      - "8051:8051"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-ledger:
        condition: service_started
      xstockstrat-portfolio:
        condition: service_started
      xstockstrat-notify:
        condition: service_started
      xstockstrat-indicators:
        condition: service_started

  # ── Trader Frontend ─────────────────────────────────────────────────────
  xstockstrat-trader:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-trader/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-trader:latest-dev
    container_name: xstockstrat-trader
    env_file: [".env.local", ".env.fe.local"]
    environment:
      <<: *common-env
      # Connect-RPC HTTP endpoints (not raw gRPC ports)
      TRADING_HTTP_ENDPOINT: http://xstockstrat-trading:8051
      PORTFOLIO_HTTP_ENDPOINT: http://xstockstrat-portfolio:8052
      NOTIFY_HTTP_ENDPOINT: http://xstockstrat-notify:8059
      IDENTITY_HTTP_ENDPOINT: http://xstockstrat-identity:8058
      MARKETDATA_HTTP_ENDPOINT: http://xstockstrat-marketdata:8053
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVICE_NAME: trader
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3000:3000"
    depends_on:
      - xstockstrat-trading
      - xstockstrat-portfolio
      - xstockstrat-notify
      - xstockstrat-identity
      - xstockstrat-marketdata

  # ── Insights Frontend ───────────────────────────────────────────────────
  xstockstrat-insights:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-insights/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-insights:latest-dev
    container_name: xstockstrat-insights
    env_file: [".env.local", ".env.fe.local"]
    environment:
      <<: *common-env
      # Connect-RPC HTTP endpoints (not raw gRPC ports)
      ANALYSIS_HTTP_ENDPOINT: http://xstockstrat-analysis:8056
      INDICATORS_HTTP_ENDPOINT: http://xstockstrat-indicators:8054
      MARKETDATA_HTTP_ENDPOINT: http://xstockstrat-marketdata:8053
      PORTFOLIO_HTTP_ENDPOINT: http://xstockstrat-portfolio:8052
      TRADING_HTTP_ENDPOINT: http://xstockstrat-trading:8051
      NOTIFY_HTTP_ENDPOINT: http://xstockstrat-notify:8059
      IDENTITY_HTTP_ENDPOINT: http://xstockstrat-identity:8058
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVICE_NAME: insights
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3001:3001"
    depends_on:
      - xstockstrat-analysis
      - xstockstrat-indicators
      - xstockstrat-marketdata

  # ── Config UI ───────────────────────────────────────────────────────────
  xstockstrat-config-ui:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-config-ui/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-config-ui:latest-dev
    container_name: xstockstrat-config-ui
    env_file: [".env.local", ".env.fe.local"]
    environment:
      <<: [*common-env, *db-url]
      # Connect-RPC HTTP endpoint for xstockstrat-config
      CONFIG_HTTP_ENDPOINT: http://xstockstrat-config:8060
      IDENTITY_HTTP_ENDPOINT: http://xstockstrat-identity:8058
      INGEST_HTTP_ENDPOINT: http://xstockstrat-ingest:8055
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVICE_NAME: config-ui
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3002:3002"
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      xstockstrat-config:
        condition: service_healthy
      xstockstrat-identity:
        condition: service_started

  # ── Reverse Proxy ───────────────────────────────────────────────────────
  # Single public entry point that routes /trader, /insights, /config-ui to
  # their respective Next.js frontends. Service-to-service Connect-RPC calls
  # remain on the internal network and do NOT flow through nginx.
  nginx:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-nginx/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-nginx:latest-dev
    container_name: xstockstrat-nginx
    environment:
      - XSTOCKSTRAT_TRADER_PRIVATE_URL=xstockstrat-trader
      - XSTOCKSTRAT_INSIGHTS_PRIVATE_URL=xstockstrat-insights
      - XSTOCKSTRAT_CONFIG_UI_PRIVATE_URL=xstockstrat-config-ui
      - XSTOCKSTRAT_AGENT_PRIVATE_URL=xstockstrat-agent
    ports:
      - "80:80"
    depends_on:
      - xstockstrat-trader
      - xstockstrat-insights
      - xstockstrat-config-ui
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ── Agent MCP Server ────────────────────────────────────────────────────
  xstockstrat-agent:
    <<: *svc
    build:
      context: .
      dockerfile: services/xstockstrat-agent/Dockerfile
    image: registry.digitalocean.com/${DO_REGISTRY_NAME:-xstockstrat}/xstockstrat-agent:latest-dev
    container_name: xstockstrat-agent
    env_file: [".env.local"]
    environment:
      <<: *common-env
      INGEST_HTTP_ENDPOINT: http://xstockstrat-ingest:8055
      NOTIFY_HTTP_ENDPOINT: http://xstockstrat-notify:8059
      ANALYSIS_HTTP_ENDPOINT: http://xstockstrat-analysis:8056
      IDENTITY_ENDPOINT: xstockstrat-identity:50058
      CONFIG_ENDPOINT: xstockstrat-config:50060
      MCP_TRANSPORT: sse
      MCP_SSE_PORT: "9000"
      MCP_AGENT_SECRET: ${MCP_AGENT_SECRET:-}
    ports:
      - "9000:9000"
    depends_on:
      - xstockstrat-ingest
      - xstockstrat-notify
      - xstockstrat-analysis
      - xstockstrat-identity
      xstockstrat-config:
        condition: service_healthy
