user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Upstream backend services ──────────────────────────────────────────
    upstream trader_backend {
        server ${TRADER_UPSTREAM}:3000;
    }

    upstream insights_backend {
        server ${INSIGHTS_UPSTREAM}:3001;
    }

    upstream config_ui_backend {
        server ${CONFIG_UI_UPSTREAM}:3002;
    }

    upstream agent_backend {
        server ${AGENT_UPSTREAM}:9000;
    }

    # ── Main HTTP server ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
        # Strip auth propagation headers from all inbound external requests (FR-7, FR-9).
        # Prevents external callers from spoofing user identity, permission scope, or trace context.
        # These headers are only valid when set by internal services.
        proxy_set_header x-user-id "";
        proxy_set_header x-access-scope "";
        proxy_set_header x-trace-id "";
        proxy_buffering off;
        proxy_request_buffering off;

        # ── Root: redirect bare domain to the default app ─────────────────
        # Without this, hitting https://<host>/ returns 404 because no
        # location handles "/" specifically (all other routes require a
        # /trader, /insights, /config-ui prefix).
        location = / {
            return 302 /trader;
        }

        # ── Route: /trader/* → xstockstrat-trader:3000 ────────────────────
        # Prefix match covers /trader, /trader/, and all sub-paths.
        # No trailing slash on proxy_pass: Next.js receives the full URI (required for basePath=/trader).
        location /trader {
            proxy_pass http://trader_backend;
        }

        # ── Route: /insights/* → xstockstrat-insights:3001 ───────────────
        location /insights {
            proxy_pass http://insights_backend;
        }

        # ── Route: /config-ui/* → xstockstrat-config-ui:3002 ────────────
        location /config-ui {
            proxy_pass http://config_ui_backend;
        }

        # ── Route: /agent/sse → xstockstrat-agent:9000 ──────────────────
        location /agent/sse {
            proxy_pass http://agent_backend/sse;
            proxy_read_timeout 3600s;
        }

        location /agent/messages {
            proxy_pass http://agent_backend/messages;
            proxy_read_timeout 3600s;
        }

        # Health check endpoint on nginx itself
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-reverse-proxy"}';
            add_header Content-Type application/json;
        }
    }
}
