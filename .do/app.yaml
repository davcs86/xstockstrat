name: xstockstrat-prod
region: nyc

# Global environment variables — inherited by all services, workers, and jobs.
# Component-level envs override these when the same key is set.
envs:
  - key: APPLICATION_ENV
    value: production
  - key: TRADING_MODE
    value: live
  - key: OTEL_ENABLED
    value: "false"

services:
  # ── Go services ────────────────────────────────────────────────────────────

  - name: xstockstrat-trading
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    source_dir: services/xstockstrat-trading
    dockerfile_path: services/xstockstrat-trading/Dockerfile
    http_port: 8051
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50051"
      - key: CONNECT_PORT
        value: "8051"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_URL}
      - key: PORTFOLIO_ENDPOINT
        value: ${xstockstrat-portfolio.PRIVATE_URL}
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  - name: xstockstrat-portfolio
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    source_dir: services/xstockstrat-portfolio
    dockerfile_path: services/xstockstrat-portfolio/Dockerfile
    http_port: 8052
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50052"
      - key: CONNECT_PORT
        value: "8052"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  - name: xstockstrat-marketdata
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    source_dir: services/xstockstrat-marketdata
    dockerfile_path: services/xstockstrat-marketdata/Dockerfile
    http_port: 8053
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50053"
      - key: CONNECT_PORT
        value: "8053"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: ALPACA_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ALPACA_API_SECRET
        scope: RUN_TIME
        type: SECRET

  # ── Python services ────────────────────────────────────────────────────────

  - name: xstockstrat-indicators
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    source_dir: services/xstockstrat-indicators
    dockerfile_path: services/xstockstrat-indicators/Dockerfile
    http_port: 8054
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50054"
      - key: CONNECT_PORT
        value: "8054"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}

  - name: xstockstrat-ingest
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    source_dir: services/xstockstrat-ingest
    dockerfile_path: services/xstockstrat-ingest/Dockerfile
    http_port: 8055
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50055"
      - key: CONNECT_PORT
        value: "8055"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  - name: xstockstrat-analysis
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    source_dir: services/xstockstrat-analysis
    dockerfile_path: services/xstockstrat-analysis/Dockerfile
    http_port: 8056
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50056"
      - key: CONNECT_PORT
        value: "8056"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_URL}
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  # ── Node.js services ───────────────────────────────────────────────────────

  - name: xstockstrat-ledger
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-ledger/Dockerfile
    http_port: 8057
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50057"
      - key: CONNECT_PORT
        value: "8057"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  - name: xstockstrat-identity
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-identity/Dockerfile
    http_port: 8058
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
        value: "50058"
      - key: CONNECT_PORT
