      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: xstockstrat-notify
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-notify/Dockerfile
    http_port: 8059
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: GRPC_PORT
