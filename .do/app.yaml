      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  - name: xstockstrat-config
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-config/Dockerfile
    http_port: 8060
    instance_count: 1
    # professional-s: extra headroom for WatchConfig streaming RPC (above 60s idle timeout)
    instance_size_slug: professional-s
    envs:
      - key: GRPC_PORT
        value: "50060"
      - key: CONNECT_PORT
        value: "8060"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  # ── Next.js frontends ──────────────────────────────────────────────────────

  # ── Nginx Reverse Proxy (new HTTP ingress) ────────────────────────────────

  - name: xstockstrat-nginx
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main
      deploy_on_push: false
    source_dir: services/xstockstrat-nginx
    dockerfile_path: services/xstockstrat-nginx/Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: XSTOCKSTRAT_TRADER_PRIVATE_URL
        value: ${xstockstrat-trader.PRIVATE_URL}
      - key: XSTOCKSTRAT_INSIGHTS_PRIVATE_URL
        value: ${xstockstrat-insights.PRIVATE_URL}
      - key: XSTOCKSTRAT_CONFIG_UI_PRIVATE_URL
        value: ${xstockstrat-config-ui.PRIVATE_URL}

  - name: xstockstrat-trader
