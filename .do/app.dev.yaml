# App name:   xstockstrat-staging
# DO project: set DO_DEV_PROJECT_ID in GitHub Secrets → Actions
#             doctl projects list   ← find your project UUID
#             doctl apps list       ← find DO_DEV_APP_ID after first deploy
name: xstockstrat-staging
region: nyc

# Route all public traffic through the nginx reverse proxy.
# All backend services use internal_ports (no public routes).
ingress:
  rules:
    - component:
        name: xstockstrat-nginx
      match:
        path:
          prefix: /

# Global environment variables — inherited by all services, workers, and jobs.
# Component-level envs override these when the same key is set.
envs:
  - key: APPLICATION_ENV
    value: development
  - key: TRADING_MODE
    value: paper
  - key: OTEL_ENABLED
    value: "false"
  - key: OTEL_EXPORTER_OTLP_ENDPOINT
    scope: RUN_TIME
  - key: OTEL_EXPORTER_OTLP_HEADERS
    scope: RUN_TIME
    type: SECRET

services:
  # ── Go services ────────────────────────────────────────────────────────────

  - name: xstockstrat-trading
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-trading/Dockerfile
    internal_ports:
      - 8051
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50051"
      - key: CONNECT_PORT
        value: "8051"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: PORTFOLIO_ENDPOINT
        value: ${xstockstrat-portfolio.PRIVATE_DOMAIN}:50052
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_DOMAIN}:50054
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: SERVICE_NAME
        value: trading

  - name: xstockstrat-portfolio
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-portfolio/Dockerfile
    internal_ports:
      - 8052
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50052"
      - key: CONNECT_PORT
        value: "8052"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: SERVICE_NAME
        value: portfolio

  - name: xstockstrat-marketdata
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-marketdata/Dockerfile
    internal_ports:
      - 8053
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50053"
      - key: CONNECT_PORT
        value: "8053"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: ALPACA_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ALPACA_API_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SERVICE_NAME
        value: marketdata

  # ── Python services ────────────────────────────────────────────────────────

  - name: xstockstrat-indicators
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-indicators/Dockerfile
    internal_ports:
      - 8054
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50054"
      - key: CONNECT_PORT
        value: "8054"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: SERVICE_NAME
        value: indicators

  - name: xstockstrat-ingest
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-ingest/Dockerfile
    internal_ports:
      - 8055
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50055"
      - key: CONNECT_PORT
        value: "8055"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_DOMAIN}:50053
      - key: IDENTITY_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_DOMAIN}:50058
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: SERVICE_NAME
        value: ingest
      - key: MCP_AGENT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: xstockstrat-analysis
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-analysis/Dockerfile
    internal_ports:
      - 8056
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50056"
      - key: CONNECT_PORT
        value: "8056"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_DOMAIN}:50053
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_DOMAIN}:50054
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: SERVICE_NAME
        value: analysis
      - key: MCP_AGENT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: xstockstrat-agent
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-agent/Dockerfile
    internal_ports:
      - 9000
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: INGEST_HTTP_ENDPOINT
        value: ${xstockstrat-ingest.PRIVATE_URL}
      - key: NOTIFY_HTTP_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: ANALYSIS_HTTP_ENDPOINT
        value: ${xstockstrat-analysis.PRIVATE_URL}
      - key: IDENTITY_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_DOMAIN}:50058
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_SSE_PORT
        value: "9000"
      - key: MCP_AGENT_SECRET
        scope: RUN_TIME
        type: SECRET

  # ── Node.js services ───────────────────────────────────────────────────────

  - name: xstockstrat-ledger
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
