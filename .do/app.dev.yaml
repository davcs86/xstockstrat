    envs:
      - key: GRPC_PORT
        value: "50057"
      - key: CONNECT_PORT
        value: "8057"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: SERVICE_NAME
        value: ledger

  - name: xstockstrat-identity
    image:
      registry_type: DOCR
      registry: YOUR_REGISTRY_NAME
      repository: xstockstrat-identity
      tag: YOUR_IMAGE_TAG
    internal_ports:
      - 8058
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50058"
      - key: CONNECT_PORT
        value: "8058"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SERVICE_NAME
        value: identity

  - name: xstockstrat-notify
    image:
      registry_type: DOCR
      registry: YOUR_REGISTRY_NAME
      repository: xstockstrat-notify
      tag: YOUR_IMAGE_TAG
    internal_ports:
      - 8059
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50059"
      - key: CONNECT_PORT
