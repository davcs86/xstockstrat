# App name:   xstockstrat-staging
# DO project: set DO_DEV_PROJECT_ID in GitHub Secrets → Actions
#             doctl projects list   ← find your project UUID
#             doctl apps list       ← find DO_DEV_APP_ID after first deploy
name: xstockstrat-staging
region: nyc

# Route all public traffic through the nginx reverse proxy.
# All backend services use internal_ports for TCP (any protocol, including gRPC H2C).
ingress:
  rules:
    - component:
        name: xstockstrat-agent
      match:
        path:
          prefix: /agent
    - component:
        name: xstockstrat-ui
      match:
        path:
          prefix: /

# Global environment variables — inherited by all services, workers, and jobs.
# Component-level envs override these when the same key is set.
envs:
  - key: APPLICATION_ENV
    value: development
  - key: TRADING_MODE
    value: paper
  - key: OTEL_ENABLED
    value: "false"
  - key: OTEL_EXPORTER_OTLP_ENDPOINT
    scope: RUN_TIME
  - key: OTEL_EXPORTER_OTLP_HEADERS
    scope: RUN_TIME
    type: SECRET

services:
  # ── Go services ────────────────────────────────────────────────────────────

  - name: xstockstrat-trading
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-trading
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50051
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50051"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: PORTFOLIO_ENDPOINT
        value: ${xstockstrat-portfolio.PRIVATE_DOMAIN}:50052
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_DOMAIN}:50054
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: SERVICE_NAME
        value: trading
      - key: BROKER_ACCOUNTS_ENCRYPTION_KEY
        scope: RUN_TIME
        value: YOUR_DEV_BROKER_ACCOUNTS_ENCRYPTION_KEY
        type: SECRET

  - name: xstockstrat-portfolio
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-portfolio
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50052
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50052"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: SERVICE_NAME
        value: portfolio

  - name: xstockstrat-marketdata
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-marketdata
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50053
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50053"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: ALPACA_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ALPACA_API_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SERVICE_NAME
        value: marketdata

  # ── Python services ────────────────────────────────────────────────────────

  - name: xstockstrat-indicators
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-indicators
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50054
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50054"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: WAIT_FOR
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060 ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: SERVICE_NAME
        value: indicators
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}

  - name: xstockstrat-ingest
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-ingest
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50055
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50055"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_DOMAIN}:50053
      - key: IDENTITY_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_DOMAIN}:50058
      - key: WAIT_FOR
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060 ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057 ${xstockstrat-identity.PRIVATE_DOMAIN}:50058
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: SERVICE_NAME
        value: ingest
      - key: MCP_AGENT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: xstockstrat-analysis
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-analysis
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50056
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50056"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_DOMAIN}:50053
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_DOMAIN}:50054
      - key: INGEST_ENDPOINT
        value: ${xstockstrat-ingest.PRIVATE_DOMAIN}:50055
      - key: WAIT_FOR
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060 ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057 ${xstockstrat-indicators.PRIVATE_DOMAIN}:50054
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: SERVICE_NAME
        value: analysis
      - key: MCP_AGENT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: xstockstrat-agent
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-agent
      tag: "YOUR_IMAGE_TAG"
    http_port: 9000
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: INGEST_ENDPOINT
        value: ${xstockstrat-ingest.PRIVATE_DOMAIN}:50055
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: ANALYSIS_ENDPOINT
        value: ${xstockstrat-analysis.PRIVATE_DOMAIN}:50056
      - key: IDENTITY_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_DOMAIN}:50058
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_DOMAIN}:50054
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: WAIT_FOR
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060 ${xstockstrat-identity.PRIVATE_DOMAIN}:50058
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_SSE_PORT
        value: "9000"
      - key: MCP_AGENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: UI_BASE_URL
        value: ${APP_URL}

  # ── Node.js services ───────────────────────────────────────────────────────

  - name: xstockstrat-ledger
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-ledger
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50057
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50057"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: WAIT_FOR
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: DATABASE_CA_CERT
        scope: RUN_TIME
        value: ${xstockstrat.CA_CERT}
      - key: SERVICE_NAME
        value: ledger

  - name: xstockstrat-identity
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-identity
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50058
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50058"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: WAIT_FOR
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060 ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: DATABASE_CA_CERT
        scope: RUN_TIME
        value: ${xstockstrat.CA_CERT}
      - key: JWT_SECRET
        scope: RUN_TIME
        value: YOUR_DEV_JWT_SECRET
        type: SECRET
      - key: SERVICE_NAME
        value: identity

  - name: xstockstrat-notify
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-notify
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50059
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50059"
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: WAIT_FOR
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060 ${xstockstrat-ledger.PRIVATE_DOMAIN}:50057
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: DATABASE_CA_CERT
        scope: RUN_TIME
        value: ${xstockstrat.CA_CERT}
      - key: SERVICE_NAME
        value: notify
      - key: MCP_AGENT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: xstockstrat-config
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-config
      tag: "YOUR_IMAGE_TAG"
    internal_ports:
      - 50060
    instance_count: 1
    # basic-s: extra headroom for WatchConfig streaming RPC (above 60s idle timeout)
    instance_size_slug: basic-s
    envs:
      - key: GRPC_PORT
        value: "50060"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}
      - key: DATABASE_CA_CERT
        scope: RUN_TIME
        value: ${xstockstrat.CA_CERT}
      - key: SERVICE_NAME
        value: config

  # ── Consolidated Frontend ──────────────────────────────────────────────────

  - name: xstockstrat-ui
    image:
      registry_type: GHCR
      registry: YOUR_GITHUB_ORG
      repository: xstockstrat/xstockstrat-ui
      tag: "YOUR_IMAGE_TAG"
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: TRADING_ENDPOINT
        value: ${xstockstrat-trading.PRIVATE_DOMAIN}:50051
      - key: PORTFOLIO_ENDPOINT
        value: ${xstockstrat-portfolio.PRIVATE_DOMAIN}:50052
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_DOMAIN}:50059
      - key: IDENTITY_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_DOMAIN}:50058
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_DOMAIN}:50053
      - key: ANALYSIS_ENDPOINT
        value: ${xstockstrat-analysis.PRIVATE_DOMAIN}:50056
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_DOMAIN}:50054
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_DOMAIN}:50060
      - key: INGEST_ENDPOINT
        value: ${xstockstrat-ingest.PRIVATE_DOMAIN}:50055
      - key: APP_URL
        value: ${APP_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        value: YOUR_DEV_JWT_SECRET
        type: SECRET
      - key: SERVICE_NAME
        value: xstockstrat-ui
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}

jobs:
  # Runs golang-migrate against all service schemas before services start.
  # kind: PRE_DEPLOY ensures this completes before any service restarts.
  - name: db-migrator
    kind: PRE_DEPLOY
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: scripts/Dockerfile.migrate
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${xstockstrat.DATABASE_URL}

databases:
  - name: xstockstrat
    engine: PG
    version: "15"
    production: true
    cluster_name: xstockstrat
    db_name: xstockstrat-staging
