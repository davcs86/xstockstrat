name: xstockstrat-dev
region: nyc

services:
  # ── Go services ────────────────────────────────────────────────────────────

  - name: xstockstrat-trading
    github:
      repo: davcs86/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    source_dir: services/xstockstrat-trading
    dockerfile_path: services/xstockstrat-trading/Dockerfile
    http_port: 8051
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: GRPC_PORT
        value: "50051"
      - key: CONNECT_PORT
        value: "8051"
      - key: GO_ENV
        value: development
      - key: TRADING_MODE
        value: paper
      - key: ALPACA_PAPER
        value: "true"
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: CONFIG_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: LEDGER_ENDPOINT
        value: ${xstockstrat-ledger.PRIVATE_URL}
      - key: NOTIFY_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: MARKETDATA_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_URL}
      - key: PORTFOLIO_ENDPOINT
        value: ${xstockstrat-portfolio.PRIVATE_URL}
      - key: INDICATORS_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_URL}
      - key: DB_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: OTEL_ENABLED
        value: "true"
      - key: OTEL_SERVICE_NAME
        value: xstockstrat-trading
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: REPLACE_WITH_GRAFANA_OTLP_ENDPOINT
        type: SECRET
      - key: OTEL_EXPORTER_OTLP_HEADERS
        value: REPLACE_WITH_AUTHORIZATION_BASIC_TOKEN
        type: SECRET
      - key: OTEL_RESOURCE_ATTRIBUTES
        value: "environment=dev,trading_mode=paper"

