  - name: xstockstrat-config
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-config/Dockerfile
    internal_ports:
      - 8060
    instance_count: 1
    # basic-s: extra headroom for WatchConfig streaming RPC (above 60s idle timeout)
    instance_size_slug: basic-s
    envs:
      - key: GRPC_PORT
        value: "50060"
      - key: CONNECT_PORT
        value: "8060"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: SERVICE_NAME
        value: config

  # ── Next.js frontends ──────────────────────────────────────────────────────

  # ── Nginx Reverse Proxy (new HTTP ingress) ────────────────────────────────

  - name: xstockstrat-nginx
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: services/xstockstrat-nginx/Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: XSTOCKSTRAT_TRADER_PRIVATE_URL
        value: ${xstockstrat-trader.PRIVATE_DOMAIN}
      - key: XSTOCKSTRAT_INSIGHTS_PRIVATE_URL
        value: ${xstockstrat-insights.PRIVATE_DOMAIN}
      - key: XSTOCKSTRAT_CONFIG_UI_PRIVATE_URL
        value: ${xstockstrat-config-ui.PRIVATE_DOMAIN}
      - key: XSTOCKSTRAT_AGENT_PRIVATE_URL
        value: ${xstockstrat-agent.PRIVATE_DOMAIN}

  - name: xstockstrat-trader
    image:
      registry_type: DOCR
      registry: YOUR_REGISTRY_NAME
      repository: xstockstrat-trader
      tag: YOUR_IMAGE_TAG
    internal_ports:
      - 3000
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: TRADING_HTTP_ENDPOINT
        value: ${xstockstrat-trading.PRIVATE_URL}
      - key: PORTFOLIO_HTTP_ENDPOINT
        value: ${xstockstrat-portfolio.PRIVATE_URL}
      - key: NOTIFY_HTTP_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: IDENTITY_HTTP_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_URL}
      - key: MARKETDATA_HTTP_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_URL}
      - key: APP_URL
        value: ${APP_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SERVICE_NAME
        value: trader

  - name: xstockstrat-insights
    image:
      registry_type: DOCR
      registry: YOUR_REGISTRY_NAME
      repository: xstockstrat-insights
      tag: YOUR_IMAGE_TAG
    internal_ports:
      - 3001
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: ANALYSIS_HTTP_ENDPOINT
        value: ${xstockstrat-analysis.PRIVATE_URL}
      - key: INDICATORS_HTTP_ENDPOINT
        value: ${xstockstrat-indicators.PRIVATE_URL}
      - key: MARKETDATA_HTTP_ENDPOINT
        value: ${xstockstrat-marketdata.PRIVATE_URL}
      - key: PORTFOLIO_HTTP_ENDPOINT
        value: ${xstockstrat-portfolio.PRIVATE_URL}
      - key: TRADING_HTTP_ENDPOINT
        value: ${xstockstrat-trading.PRIVATE_URL}
      - key: NOTIFY_HTTP_ENDPOINT
        value: ${xstockstrat-notify.PRIVATE_URL}
      - key: IDENTITY_HTTP_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_URL}
      - key: APP_URL
        value: ${APP_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SERVICE_NAME
        value: insights

  - name: xstockstrat-config-ui
    image:
      registry_type: DOCR
      registry: YOUR_REGISTRY_NAME
      repository: xstockstrat-config-ui
      tag: YOUR_IMAGE_TAG
    internal_ports:
      - 3002
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: CONFIG_HTTP_ENDPOINT
        value: ${xstockstrat-config.PRIVATE_URL}
      - key: IDENTITY_HTTP_ENDPOINT
        value: ${xstockstrat-identity.PRIVATE_URL}
      - key: INGEST_HTTP_ENDPOINT
        value: ${xstockstrat-ingest.PRIVATE_URL}
      - key: APP_URL
        value: ${APP_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SERVICE_NAME
        value: config-ui

jobs:
  # Runs golang-migrate against all service schemas before services start.
  # kind: PRE_DEPLOY ensures this completes before any service restarts.
  - name: db-migrator
    kind: PRE_DEPLOY
    github:
      repo: YOUR_GITHUB_ORG/xstockstrat-orchestration
      branch: main-dev
      deploy_on_push: false
    dockerfile_path: scripts/Dockerfile.migrate
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

databases:
  - name: db
    cluster_name: xstockstrat-db
    engine: PG
    version: "15"
    production: true
