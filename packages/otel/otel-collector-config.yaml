# packages/otel/otel-collector-config.yaml
#
# OpenTelemetry Collector configuration for local development.
# Used by the `otel-collector` service in docker-compose.yml.
#
# Receives OTLP from all xstockstrat services on:
#   - gRPC :4317  (preferred for Go and Python services)
#   - HTTP :4318  (preferred for Node.js services)
#
# Exports all three signal types (logs, metrics, traces) to Grafana Cloud via OTLP.
# Requires OTEL_EXPORTER_OTLP_ENDPOINT and OTEL_EXPORTER_OTLP_HEADERS in the environment
# (provided via docker-compose from your local .env file).
#
# OTEL_EXPORTER_OTLP_HEADERS must be the Authorization header VALUE only:
#   Basic <base64(instanceId:apiKey)>
# (Grafana Cloud provides the pre-encoded string — copy the part after "Basic ".)
#
# For production (DO App Platform), services push OTLP directly to Grafana Cloud —
# no collector deployment is needed there. See docs/setup/grafana-cloud.md.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Drop spans/metrics/logs when memory exceeds limit — prevents OOM in dev
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  # Batch before exporting — reduces outbound requests to Grafana Cloud
  batch:
    timeout: 10s
    send_batch_size: 1000
    send_batch_max_size: 2000


exporters:
  # Grafana Cloud OTLP gateway — handles logs, metrics, and traces in one endpoint.
  # OTEL_EXPORTER_OTLP_ENDPOINT: https://otlp-gateway-<region>.grafana.net/otlp
  # OTEL_EXPORTER_OTLP_HEADERS:  Basic base64(<instanceId>:<apiKey>)  (Grafana provides pre-encoded)
  otlphttp/grafana:
    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
    headers:
      Authorization: "${env:OTEL_EXPORTER_OTLP_HEADERS}"
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 120s

  # Debug exporter: logs a summary of received telemetry to collector stdout.
  # Safe to leave enabled in dev — remove in prod to reduce noise.
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 100

service:
  extensions: [health_check, pprof]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/grafana, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/grafana, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/grafana, debug]
