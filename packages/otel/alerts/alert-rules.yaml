# Grafana unified-alerting provisioning file (apiVersion 1).
#
# Provision via Grafana file-based provisioning (self-hosted) or import through
# Grafana Cloud → Alerting → Alert rules → Import. See README.md in this directory
# for the datasource-UID substitution and folder-creation steps.
#
# Placeholders to substitute before provisioning:
#   ${DS_PROMETHEUS_UID}  — UID of your Grafana Cloud Prometheus/Mimir datasource
#   ${DS_LOKI_UID}        — UID of your Grafana Cloud Loki datasource
# Find them at Grafana → Connections → Data sources → <name> → (UID in the URL).
#
# Notification routing (contact point / policy) is configured separately in Grafana
# and is intentionally NOT pinned here so each environment can route to its own
# email / Slack / OnCall target. V1 routes to email or Slack via feature 020
# (notify-external-fanout). See README.md.

apiVersion: 1

groups:
  - orgId: 1
    name: xstockstrat-service-health
    folder: xstockstrat
    interval: 1m
    rules:
      # FR-4.1 — any service error rate > 1% for 5 minutes
      - uid: xstk-error-rate-high
        title: Service error rate > 1%
        condition: C
        for: 5m
        labels:
          severity: critical
          platform: xstockstrat
        annotations:
          summary: "{{ $labels.service_name }} gRPC error rate is {{ printf \"%.2f\" $values.B.Value }}% (> 1% for 5m)"
          runbook: docs/runbooks/bug-triage.md
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              refId: A
              editorMode: code
              expr: |
                100 * sum by (service_name) (rate(rpc_server_duration_milliseconds_count{rpc_grpc_status_code!="0"}[5m]))
                / clamp_min(sum by (service_name) (rate(rpc_server_duration_milliseconds_count[5m])), 0.001)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1] }

  - orgId: 1
    name: xstockstrat-latency
    folder: xstockstrat
    interval: 1m
    rules:
      # FR-4.2 — any service P99 latency > 2s for 3 minutes
      - uid: xstk-p99-latency-high
        title: Service P99 latency > 2s
        condition: C
        for: 3m
        labels:
          severity: warning
          platform: xstockstrat
        annotations:
          summary: "{{ $labels.service_name }} P99 gRPC latency is {{ printf \"%.0f\" $values.B.Value }} ms (> 2000 ms for 3m)"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: ${DS_PROMETHEUS_UID}
            model:
              refId: A
              editorMode: code
              expr: |
                histogram_quantile(0.99, sum by (le, service_name) (rate(rpc_server_duration_milliseconds_bucket[5m])))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [2000] }

  - orgId: 1
    name: xstockstrat-signal-pipeline
    folder: xstockstrat
    interval: 5m
    rules:
      # FR-4.3 — analysis service produces no scoring events for > 30 minutes.
      # Attach the "outside-market-hours" mute timing (see mute-timings.yaml) to the
      # notification policy so this only pages during US market hours.
      - uid: xstk-analysis-no-scoring
        title: Analysis produced no scoring events for 30m
        condition: C
        for: 0m
        labels:
          severity: critical
          platform: xstockstrat
          mute_outside_market_hours: "true"
        annotations:
          summary: "xstockstrat-analysis emitted no RunBacktest/ScoreStrategy events in the last 30 minutes"
        data:
          - refId: A
            relativeTimeRange: { from: 1800, to: 0 }
            datasourceUid: ${DS_LOKI_UID}
            model:
              refId: A
              editorMode: code
              expr: |
                sum(count_over_time({service_name="analysis"} |~ "ScoreStrategy|RunBacktest" [30m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              # Fire when the count of scoring events is below 1 (i.e. zero events).
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
