syntax = "proto3";

package xstockstrat.common.v1;

option go_package = "github.com/xstockstrat/contracts/gen/go/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

// Pagination
message PageRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PageResponse {
  string next_page_token = 1;
  int32 total_count = 2;
}

// Standard error envelope
message Error {
  string code = 1;
  string message = 2;
  map<string, string> details = 3;
}

// Money / decimal representation
message Decimal {
  int64 units = 1;       // integer part
  int32 nanos = 2;       // fractional part (0..999_999_999)
  string currency = 3;   // ISO 4217
}

// Asset identifier
message Asset {
  string symbol = 1;
  string exchange = 2;
  string asset_class = 3; // equity, crypto, option
}

// Time range
message TimeRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

// TradingMode distinguishes paper (simulated) from live (real-money) order routing.
// Used by both xstockstrat-trading and xstockstrat-portfolio.
enum TradingMode {
  TRADING_MODE_UNSPECIFIED = 0;
  TRADING_MODE_PAPER = 1;
  TRADING_MODE_LIVE = 2;
}

// Environment distinguishes dev from production deployments.
// Used by xstockstrat-config to scope config values per deployment environment.
enum Environment {
  ENVIRONMENT_UNSPECIFIED = 0;
  ENVIRONMENT_DEV = 1;
  ENVIRONMENT_PRODUCTION = 2;
}

// BrokerType identifies the broker for a registered account.
enum BrokerType {
  BROKER_TYPE_UNSPECIFIED = 0;
  BROKER_TYPE_ALPACA = 1;
  BROKER_TYPE_IBKR = 2;
}

// Timeframe is the canonical OHLCV bar interval, shared by marketdata + analysis + ingest.
// Replaces the free-text "1d"/"1Day"/"1m" strings that previously mismatched across services.
//
// 15 minutes is the smallest supported interval: the free Alpaca market-data plan serves
// 15-minute-delayed data, and the platform is not a real-time trader. TIMEFRAME_1MIN and
// TIMEFRAME_5MIN are deprecated — no longer ingested or selectable — but retained (not
// deleted) so the change stays wire- and source-compatible.
enum Timeframe {
  TIMEFRAME_UNSPECIFIED = 0;
  TIMEFRAME_15MIN = 5; // smallest supported interval
  TIMEFRAME_1HOUR = 3;
  TIMEFRAME_1DAY = 4;
  TIMEFRAME_1MIN = 1 [deprecated = true]; // deprecated: sub-15m intervals removed from the product
  TIMEFRAME_5MIN = 2 [deprecated = true]; // deprecated: sub-15m intervals removed from the product
}
