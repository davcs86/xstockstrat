version: v1
plugins:
  # Go — protobuf messages
  - name: go
    out: gen/go
    opt:
      - paths=source_relative

  # Go — gRPC service stubs
  - name: go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # Go — Connect-RPC handler + client stubs
  - name: connect-go
    out: gen/go
    opt:
      - paths=source_relative

  # Python — protobuf messages
  - name: python
    out: gen/python

  # Python — gRPC service stubs
  - name: grpc_python
    out: gen/python
    path: /usr/local/bin/protoc-gen-grpc_python

  # TypeScript — ts-proto (grpc-js compatible)
  - name: ts_proto
    out: gen/ts
    path: /opt/node22/bin/protoc-gen-ts_proto
    opt:
      - esModuleInterop=true
      - outputServices=grpc-js
      - env=node
      - useOptionals=messages
      - stringEnums=true

  # TypeScript — Connect-RPC ES (browser + Node.js fetch-based clients)
  - name: connect-es
    out: gen/ts
    path: /opt/node22/bin/protoc-gen-connect-es
    opt:
      - target=ts
