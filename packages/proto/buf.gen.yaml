version: v2
plugins:
  # Go — protobuf messages
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative

  # Go — gRPC service stubs
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # Go — Connect-RPC handler + client stubs
  - local: protoc-gen-connect-go
    out: gen/go
    opt:
      - paths=source_relative

  # Python — protobuf messages (_pb2.py)
  - remote: buf.build/protocolbuffers/python
    out: gen/python

  # Python — gRPC service stubs (_pb2_grpc.py)
  - remote: buf.build/grpc/python
    out: gen/python

  # TypeScript — ts-proto (grpc-js compatible)
  - remote: buf.build/community/stephenh-ts-proto
    out: gen/ts
    opt:
      - esModuleInterop=true
      - outputServices=grpc-js
      - env=node
      - useOptionals=messages
      - stringEnums=true

  # TypeScript — protoc-gen-es message types (*_pb.ts); required by connect-es
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt:
      - target=ts

  # TypeScript — Connect-RPC ES service stubs (*_connect.ts, browser + fetch)
  - remote: buf.build/connectrpc/es
    out: gen/ts
    opt:
      - target=ts
