version: v2
plugins:
  # Go — protobuf messages
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative

  # Go — gRPC service stubs
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # Go — Connect-RPC handler + client stubs
  - local: protoc-gen-connect-go
    out: gen/go
    opt:
      - paths=source_relative

  # TypeScript — ts-proto (grpc-js compatible)
  # Binary installed via packages/proto/gen/ts devDependencies (ts-proto)
  - local: protoc-gen-ts_proto
    out: gen/ts
    opt:
      - esModuleInterop=true
      - outputServices=grpc-js
      - env=node
      - useOptionals=messages
      - stringEnums=true

  # TypeScript — protoc-gen-es message types (*_pb.ts); required by connect-es
  # Binary installed via packages/proto/gen/ts devDependencies (@bufbuild/protoc-gen-es)
  - local: protoc-gen-es
    out: gen/ts
    opt:
      - target=ts

  # TypeScript — Connect-RPC ES service stubs (*_connect.ts, browser + fetch)
  # Binary installed via packages/proto/gen/ts devDependencies (@connectrpc/protoc-gen-connect-es)
  - local: protoc-gen-connect-es
    out: gen/ts
    opt:
      - target=ts

# Python stubs (_pb2.py + _pb2_grpc.py) are generated by buf-gen.sh directly
# via grpcio-tools (python3 -m grpc_tools.protoc) — no buf plugin needed.
