version: v1
plugins:
  # Go — protobuf messages
  - name: go
    out: gen/go
    opt:
      - paths=source_relative

  # Go — gRPC service stubs
  - name: go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # Go — Connect-RPC handler + client stubs
  - name: connect-go
    out: gen/go
    opt:
      - paths=source_relative

  # Python — protobuf messages
  - name: python
    out: gen/python

  # Python — gRPC service stubs (protoc-gen-grpc_python from grpcio-tools)
  - name: grpc_python
    out: gen/python

  # TypeScript — ts-proto (grpc-js compatible)
  # Install: npm install -g ts-proto
  - name: ts_proto
    out: gen/ts
    opt:
      - esModuleInterop=true
      - outputServices=grpc-js
      - env=node
      - useOptionals=messages
      - stringEnums=true

  # TypeScript — Connect-RPC ES (browser + Node.js fetch-based clients)
  # Install: npm install -g @connectrpc/protoc-gen-connect-es
  # NOTE: Requires protoc-gen-es (_pb.ts files) to be generated first.
  #       Uncomment once protoc-gen-es is added to this config.
  # - name: connect-es
  #   out: gen/ts
  #   opt:
  #     - target=ts
