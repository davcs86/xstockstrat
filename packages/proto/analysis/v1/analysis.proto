syntax = "proto3";

package xstockstrat.analysis.v1;

option go_package = "github.com/xstockstrat/contracts/gen/go/analysis/v1;analysisv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "common/v1/common.proto";

service AnalysisService {
  rpc RunBacktest(RunBacktestRequest) returns (BacktestResult);
  rpc ScoreStrategy(ScoreStrategyRequest) returns (StrategyScore);
  rpc ListStrategies(ListStrategiesRequest) returns (ListStrategiesResponse);
  rpc GetStrategyReport(GetStrategyReportRequest) returns (StrategyReport);
  rpc ManageStrategy(ManageStrategyRequest) returns (StrategyDefinition);
  rpc GetStrategy(GetStrategyRequest) returns (StrategyDefinition);
  rpc ListStrategyDefinitions(ListStrategyDefinitionsRequest) returns (ListStrategyDefinitionsResponse);
  rpc SetStrategyLive(SetStrategyLiveRequest) returns (SetStrategyLiveResponse);
}

message RunBacktestRequest {
  string strategy_id = 1;
  xstockstrat.common.v1.TimeRange range = 2;
  repeated string symbols = 3;
  double initial_capital = 4;
  google.protobuf.Struct strategy_params = 5;
  // field 6 — resolve definition from DB; legacy strategy_params (field 5) remains supported
  string strategy_id_ref = 6;
  // field 7 — inline definition; takes precedence over strategy_id_ref if both supplied
  StrategyDefinition inline_definition = 7;
}

enum BacktestStatus {
  BACKTEST_STATUS_UNSPECIFIED = 0;
  BACKTEST_STATUS_OK = 1;
  BACKTEST_STATUS_INSUFFICIENT_DATA = 2;
}

message CoverageGap {
  string symbol = 1;
  xstockstrat.common.v1.Timeframe timeframe = 2;
  xstockstrat.common.v1.TimeRange requested_range = 3;
  int64 bars_have = 4;
  int64 bars_need = 5;
  // The range a caller should backfill to satisfy this backtest.
  xstockstrat.common.v1.TimeRange gap = 6;
}

message BacktestResult {
  string backtest_id = 1;
  string strategy_id = 2;
  double total_return = 3;
  double annualized_return = 4;
  double sharpe_ratio = 5;
  double max_drawdown = 6;
  double win_rate = 7;
  int32 total_trades = 8;
  double profit_factor = 9;
  google.protobuf.Timestamp completed_at = 10;
  repeated TradeRecord trades = 11;
  BacktestStatus status = 12;
  repeated CoverageGap coverage_gaps = 13; // populated per-symbol when status == INSUFFICIENT_DATA
}

message TradeRecord {
  string symbol = 1;
  string side = 2;
  double qty = 3;
  double entry_price = 4;
  double exit_price = 5;
  double pnl = 6;
  google.protobuf.Timestamp entry_time = 7;
  google.protobuf.Timestamp exit_time = 8;
}

message ScoreStrategyRequest {
  string strategy_id = 1;
  xstockstrat.common.v1.TimeRange range = 2;
}

message StrategyScore {
  string strategy_id = 1;
  double overall_score = 2;
  map<string, double> component_scores = 3; // e.g. sharpe, drawdown, consistency
  string rating = 4; // A/B/C/D/F
}

message StrategyReport {
  string strategy_id = 1;
  BacktestResult latest_backtest = 2;
  StrategyScore score = 3;
  google.protobuf.Struct metadata = 4;
}

message ListStrategiesRequest {
  xstockstrat.common.v1.PageRequest page = 1;
  string user_id = 2;
}

message ListStrategiesResponse {
  repeated StrategyScore strategies = 1;
  xstockstrat.common.v1.PageResponse page = 2;
}

message GetStrategyReportRequest { string strategy_id = 1; }

// ── Composable strategy model (feature 047-strategy-engine) ──────────────────

enum ComponentKind {
  COMPONENT_KIND_UNSPECIFIED = 0;
  COMPONENT_KIND_BUILTIN_INDICATOR = 1;
  COMPONENT_KIND_CUSTOM_FORMULA = 2;
}

message StrategyComponent {
  string ref_name = 1;
  ComponentKind kind = 2;
  string indicator = 3;      // used when kind == COMPONENT_KIND_BUILTIN_INDICATOR
  string formula_id = 4;     // used when kind == COMPONENT_KIND_CUSTOM_FORMULA
  map<string, double> params = 5;
}

message StrategyDefinition {
  string strategy_id = 1;
  string display_name = 2;
  repeated StrategyComponent components = 3;
  string entry_rule = 4;   // JSON-encoded condition tree
  string exit_rule = 5;    // JSON-encoded condition tree
  google.protobuf.Struct signal_params = 6;
  bool active = 7;
  bool live_enabled = 8;
}

enum StrategyOperation {
  STRATEGY_OPERATION_UNSPECIFIED = 0;
  STRATEGY_OPERATION_REGISTER = 1;
  STRATEGY_OPERATION_UPDATE = 2;
  STRATEGY_OPERATION_DEACTIVATE = 3;
}

message ManageStrategyRequest {
  StrategyOperation operation = 1;
  StrategyDefinition definition = 2;
}

message GetStrategyRequest {
  string strategy_id = 1;
}

message ListStrategyDefinitionsRequest {
  bool include_inactive = 1;
  int32 page_size = 2;
  int32 page_offset = 3;
}

message ListStrategyDefinitionsResponse {
  repeated StrategyDefinition definitions = 1;
  int32 total_count = 2;
}

// ── Live strategy→alert engine (feature 048-live-strategy-alert-engine) ──────

message SetStrategyLiveRequest {
  string strategy_id = 1;
  bool live_enabled = 2;
}

message SetStrategyLiveResponse {
  StrategyDefinition definition = 1;
}
