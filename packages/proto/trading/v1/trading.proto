syntax = "proto3";

package xstockstrat.trading.v1;

option go_package = "github.com/xstockstrat/contracts/gen/go/trading/v1;tradingv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

service TradingService {
  rpc PlaceOrder(PlaceOrderRequest) returns (Order);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc StreamOrderUpdates(StreamOrderUpdatesRequest) returns (stream Order);
  // ReplaceOrder modifies a working order's qty/price/TIF. It is broker-agnostic at
  // this surface and routes by the persisted order's broker_type
  // (Alpaca → PATCH /v2/orders/{id}; IBKR → adapter-specific modify). Allowed only
  // while the order is NEW or PARTIALLY_FILLED.
  rpc ReplaceOrder(ReplaceOrderRequest) returns (Order);
  rpc RegisterBrokerAccount (RegisterBrokerAccountRequest) returns (RegisterBrokerAccountResponse);
  rpc ListBrokerAccounts (ListBrokerAccountsRequest) returns (ListBrokerAccountsResponse);
  rpc DeregisterBrokerAccount (DeregisterBrokerAccountRequest) returns (DeregisterBrokerAccountResponse);
  // UpdateBrokerAccountCredentials replaces the stored API secrets for an existing
  // account, re-validates them against the broker, and refreshes credential_status.
  rpc UpdateBrokerAccountCredentials (UpdateBrokerAccountCredentialsRequest) returns (UpdateBrokerAccountCredentialsResponse);
  // GetTradingEnvironment reports the deployment-fixed trading mode. Users cannot
  // switch between paper and live — the environment owns this decision.
  rpc GetTradingEnvironment (GetTradingEnvironmentRequest) returns (GetTradingEnvironmentResponse);
}

message Order {
  string order_id = 1;
  string client_order_id = 2;
  string symbol = 3;
  OrderSide side = 4;
  OrderType order_type = 5;
  OrderStatus status = 6;
  double qty = 7;
  double filled_qty = 8;
  double limit_price = 9;
  double stop_price = 10;
  double filled_avg_price = 11;
  string time_in_force = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  string strategy_id = 15;
  string user_id = 16;
  xstockstrat.common.v1.TradingMode trading_mode = 17;
  string broker_order_id = 18; // Alpaca-assigned order ID, populated after broker submission
  string account_id = 19;
  xstockstrat.common.v1.BrokerType broker_type = 20;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
  ORDER_TYPE_STOP = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
  ORDER_TYPE_TRAILING_STOP = 5;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_NEW = 1;
  ORDER_STATUS_PARTIALLY_FILLED = 2;
  ORDER_STATUS_FILLED = 3;
  ORDER_STATUS_CANCELED = 4;
  ORDER_STATUS_EXPIRED = 5;
  ORDER_STATUS_REJECTED = 6;
  ORDER_STATUS_PENDING_APPROVAL = 7;
}

message PlaceOrderRequest {
  string symbol = 1;
  OrderSide side = 2;
  OrderType order_type = 3;
  double qty = 4;
  double limit_price = 5;
  double stop_price = 6;
  string time_in_force = 7;
  string strategy_id = 8;
  string user_id = 9;
  string client_order_id = 10;
  bool requires_approval = 11;
  // If UNSPECIFIED, the service uses trading.broker.paper config key to determine mode.
  xstockstrat.common.v1.TradingMode trading_mode = 12;
  // account_id routes the order to a specific broker account.
  // Required when multiple accounts are registered; optional when only one exists.
  string account_id = 13;
}

message CancelOrderRequest {
  string order_id = 1;
  string user_id = 2;
}

message CancelOrderResponse {
  bool success = 1;
  Order order = 2;
}

message GetOrderRequest {
  string order_id = 1;
}

message ListOrdersRequest {
  string user_id = 1;
  string strategy_id = 2;
  OrderStatus status = 3;
  xstockstrat.common.v1.TimeRange range = 4;
  xstockstrat.common.v1.PageRequest page = 5;
  // Filter by trading mode; UNSPECIFIED returns orders for all modes.
  xstockstrat.common.v1.TradingMode trading_mode = 6;
  // Additive filters: an UNSPECIFIED enum value or empty string means
  // "no filter on this dimension" (matches the status/trading_mode semantics above).
  string symbol = 7;
  OrderSide side = 8;
  OrderType order_type = 9;
  string account_id = 10;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  xstockstrat.common.v1.PageResponse page = 2;
}

message StreamOrderUpdatesRequest {
  string user_id = 1;
  repeated OrderStatus status_filter = 2;
}

message ReplaceOrderRequest {
  string order_id = 1;
  // Optional replacement fields; a zero/empty value means "leave unchanged".
  double qty = 2;
  double limit_price = 3;
  double stop_price = 4;
  string time_in_force = 5;
  string user_id = 6;
}

// CredentialStatus reflects the last known health of a broker account's stored
// API credentials, so the UI can surface accounts whose secrets stopped working.
enum CredentialStatus {
  CREDENTIAL_STATUS_UNSPECIFIED = 0; // never validated yet
  CREDENTIAL_STATUS_OK = 1;          // last validation succeeded
  CREDENTIAL_STATUS_INVALID = 2;     // broker rejected the credentials (auth failure)
  CREDENTIAL_STATUS_UNKNOWN = 3;     // validation could not complete (transient/network error)
}

// BrokerAccount is a registered broker account (credentials never returned).
message BrokerAccount {
  string id = 1;
  string display_name = 2;
  xstockstrat.common.v1.BrokerType broker_type = 3;
  // is_paper is derived from the deployment environment, not chosen per account.
  bool is_paper = 4;
  string user_id = 5;
  bool is_active = 6;
  // credential_status is the result of the most recent credential validation.
  CredentialStatus credential_status = 7;
  // credential_checked_at is when credential_status was last refreshed.
  google.protobuf.Timestamp credential_checked_at = 8;
}

message RegisterBrokerAccountRequest {
  string display_name = 1;
  xstockstrat.common.v1.BrokerType broker_type = 2;
  // Deprecated: paper/live is owned by the deployment environment
  // (trading.broker.paper config key / TRADING_MODE env). The server derives
  // is_paper from the environment and ignores this field.
  bool is_paper = 3 [deprecated = true];
  // credentials_json: broker-type-specific JSON blob.
  // Alpaca: {"api_key":"...","api_secret":"..."}
  // IBKR:   {"consumer_key":"...","access_token":"...","access_token_secret":"...","ibkr_account_id":"..."}
  string credentials_json = 4;
}

message RegisterBrokerAccountResponse {
  BrokerAccount account = 1;
}

message UpdateBrokerAccountCredentialsRequest {
  string account_id = 1;
  // credentials_json uses the same broker-type-specific shape as
  // RegisterBrokerAccountRequest.credentials_json.
  string credentials_json = 2;
}

message UpdateBrokerAccountCredentialsResponse {
  BrokerAccount account = 1;
}

message GetTradingEnvironmentRequest {}

message GetTradingEnvironmentResponse {
  // trading_mode is the mode every order in this deployment routes to.
  xstockstrat.common.v1.TradingMode trading_mode = 1;
  // application_env: "development" | "production".
  string application_env = 2;
}

message ListBrokerAccountsRequest {}

message ListBrokerAccountsResponse {
  repeated BrokerAccount accounts = 1;
}

message DeregisterBrokerAccountRequest {
  string account_id = 1;
}

message DeregisterBrokerAccountResponse {}
