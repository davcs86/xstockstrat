syntax = "proto3";

package xstockstrat.identity.v1;

option go_package = "github.com/xstockstrat/contracts/gen/go/identity/v1;identityv1";

import "google/protobuf/timestamp.proto";

service IdentityService {
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthTokenResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (TokenClaims);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthTokenResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  // OAuth 2.1 authorization-server backend (feature 049 Part B). The MCP agent is the
  // OAuth AS/RS HTTP facade; identity is the durable client/code store + token mint.
  rpc RegisterOAuthClient(RegisterOAuthClientRequest) returns (OAuthClient);
  rpc GetOAuthClient(GetOAuthClientRequest) returns (OAuthClient);
  rpc IssueAuthCode(IssueAuthCodeRequest) returns (IssueAuthCodeResponse);
  rpc ExchangeAuthCode(ExchangeAuthCodeRequest) returns (OAuthTokenResponse);
  rpc RefreshOAuthToken(RefreshOAuthTokenRequest) returns (OAuthTokenResponse);

  // Per-user authorized-app management (feature 051) — list/revoke OAuth clients the
  // calling user has granted access to the MCP agent. Additive over 049's OAuth backend.
  rpc ListAuthorizedApps(ListAuthorizedAppsRequest) returns (ListAuthorizedAppsResponse);
  rpc RevokeAuthorizedApp(RevokeAuthorizedAppRequest) returns (RevokeAuthorizedAppResponse);
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}

message AuthTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  TokenClaims claims = 4;
}

message TokenClaims {
  string user_id = 1;
  string email = 2;
  repeated string roles = 3;
  google.protobuf.Timestamp issued_at = 4;
  google.protobuf.Timestamp expires_at = 5;
  string aud = 6;  // audience / resource URI (OAuth audience-bound JWT, RFC 8707)
}

message ValidateTokenRequest { string token = 1; }
message RefreshTokenRequest { string refresh_token = 1; }
message RevokeTokenRequest { string token = 1; }
message RevokeTokenResponse { bool success = 1; }

// ── OAuth 2.1 messages (feature 049 Part B) ──────────────────────────────────
message OAuthClient {
  string client_id = 1;
  repeated string redirect_uris = 2;
  string client_name = 3;
  google.protobuf.Timestamp created_at = 4;
}

message RegisterOAuthClientRequest {
  repeated string redirect_uris = 1;
  string client_name = 2;
}

message GetOAuthClientRequest { string client_id = 1; }

message IssueAuthCodeRequest {
  string user_id = 1;
  string client_id = 2;
  string redirect_uri = 3;
  string code_challenge = 4;
  string resource = 5;
}

message IssueAuthCodeResponse { string code = 1; }

message ExchangeAuthCodeRequest {
  string code = 1;
  string code_verifier = 2;
  string redirect_uri = 3;
  string client_id = 4;
  string resource = 5;
}

message OAuthTokenResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_in = 3;
  string refresh_token = 4;
}

message RefreshOAuthTokenRequest {
  string refresh_token = 1;
  string resource = 2;
}

// ── Authorized-apps management (feature 051) ─────────────────────────────────
message AuthorizedApp {
  string client_id = 1;
  string client_name = 2;
  google.protobuf.Timestamp authorized_at = 3;
  // Best-effort "last refreshed" time (bumped on refresh-token rotation), NOT per-request
  // access. May be unset. The UI labels this "Last refreshed", not "Last used".
  google.protobuf.Timestamp last_used_at = 4;
  repeated string redirect_uris = 5;
}
message ListAuthorizedAppsRequest { string user_id = 1; }
message ListAuthorizedAppsResponse { repeated AuthorizedApp apps = 1; }
message RevokeAuthorizedAppRequest { string user_id = 1; string client_id = 2; }
message RevokeAuthorizedAppResponse { bool success = 1; }
