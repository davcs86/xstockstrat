syntax = "proto3";

package xstockstrat.ingest.v1;

option go_package = "github.com/xstockstrat/contracts/gen/go/ingest/v1;ingestv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "google/protobuf/struct.proto";

service IngestService {
  rpc TriggerBackfill(TriggerBackfillRequest) returns (TriggerBackfillResponse);
  rpc GetBackfillStatus(GetBackfillStatusRequest) returns (BackfillJob);
  rpc ListBackfillJobs(ListBackfillJobsRequest) returns (ListBackfillJobsResponse);
  rpc NormalizeRawData(NormalizeRawDataRequest) returns (NormalizeRawDataResponse);
  // Signal ingestion — persists newsletter/external signals to ingest.newsletter_signals hypertable
  rpc IngestSignal(IngestSignalRequest) returns (IngestSignalResponse);
  // Signal query — returns active signals filtered by source/symbol/direction and time window
  rpc QuerySignals(QuerySignalsRequest) returns (QuerySignalsResponse);
  rpc ListSignalSources(ListSignalSourcesRequest) returns (ListSignalSourcesResponse);
  rpc ManageSignalSource(ManageSignalSourceRequest) returns (ManageSignalSourceResponse);
}

message BackfillJob {
  string job_id = 1;
  repeated string symbols = 2;
  string timeframe = 3;
  xstockstrat.common.v1.TimeRange range = 4;
  BackfillStatus status = 5;
  int64 bars_processed = 6;
  int64 bars_total = 7;
  google.protobuf.Timestamp started_at = 8;
  google.protobuf.Timestamp completed_at = 9;
  string error = 10;
}

enum BackfillStatus {
  BACKFILL_STATUS_UNSPECIFIED = 0;
  BACKFILL_STATUS_QUEUED = 1;
  BACKFILL_STATUS_RUNNING = 2;
  BACKFILL_STATUS_COMPLETED = 3;
  BACKFILL_STATUS_FAILED = 4;
  BACKFILL_STATUS_PARTIAL = 5;
}

message TriggerBackfillRequest {
  repeated string symbols = 1;
  string timeframe = 2;
  xstockstrat.common.v1.TimeRange range = 3;
  bool overwrite = 4;
}

message TriggerBackfillResponse {
  string job_id = 1;
  BackfillStatus status = 2;
}

message GetBackfillStatusRequest { string job_id = 1; }

message ListBackfillJobsRequest {
  BackfillStatus status_filter = 1;
  xstockstrat.common.v1.PageRequest page = 2;
}

message ListBackfillJobsResponse {
  repeated BackfillJob jobs = 1;
  xstockstrat.common.v1.PageResponse page = 2;
}

message NormalizeRawDataRequest {
  string source = 1;
  bytes raw_data = 2;
  string format = 3; // "csv", "json", "alpaca_v2"
}

message NormalizeRawDataResponse {
  int64 rows_normalized = 1;
  repeated string errors = 2;
}

// ExternalSignal represents a newsletter or signal-source trade recommendation.
message ExternalSignal {
  string source     = 1;  // "unusual_whales" | "marketwatch" | "dividendology" | "pure_power_picks" | "simply_wall_st"
  string symbol     = 2;  // ticker (e.g. "AAPL")
  string direction  = 3;  // "buy" | "sell" | "hold" | "watchlist"
  double conviction = 4;  // 0.0 – 1.0 confidence (0.0 if not provided by source)
  google.protobuf.Timestamp valid_from  = 5;
  google.protobuf.Timestamp valid_until = 6;  // omit for open-ended
  string headline   = 7;
  string raw_url    = 8;
  repeated string tags = 9;
}

message IngestSignalRequest  { ExternalSignal signal = 1; }
message IngestSignalResponse { int64 signal_id = 1; }

message QuerySignalsRequest {
  string source    = 1;  // optional filter
  string symbol    = 2;  // optional filter
  string direction = 3;  // optional filter
  xstockstrat.common.v1.TimeRange active_window = 4;  // signals valid within this range
  xstockstrat.common.v1.PageRequest page = 5;
}

message QuerySignalsResponse {
  repeated ExternalSignal signals = 1;
  xstockstrat.common.v1.PageResponse page = 2;
}

// SignalSource represents a registered signal source entry.
// credentials_ref is intentionally absent — use has_credentials on read.
message SignalSource {
  string slug              = 1;
  string display_name      = 2;
  string source_type       = 3;
  string extractor_module  = 4;
  bool   active            = 5;
  bool   has_credentials   = 6;
  google.protobuf.Struct config_json = 7;
}

message ListSignalSourcesRequest {
  bool include_inactive = 1;
}

message ListSignalSourcesResponse {
  repeated SignalSource sources = 1;
}

// ManageSignalSourceRequest: operation is "register" | "update" | "deactivate".
// credentials_ref is only processed on register/update; ignored on deactivate.
message ManageSignalSourceRequest {
  SignalSource source         = 1;
  string       credentials_ref = 2;
  string       operation      = 3;
}

message ManageSignalSourceResponse {
  SignalSource source = 1;
}
