syntax = "proto3";

package xstockstrat.config.v1;

option go_package = "github.com/xstockstrat/contracts/gen/go/config/v1;configv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "common/v1/common.proto";

// ConfigService — live configuration via server-streaming WatchConfig.
// All services call WatchConfig at startup and stream config updates.
// Config values are scoped by environment (dev/production) and trading_mode (paper/live/all).
service ConfigService {
  // Subscribe to config updates for a given namespace/service.
  // Server streams updates as config changes; initial snapshot is the first message.
  rpc WatchConfig(WatchConfigRequest) returns (stream ConfigSnapshot);

  // One-shot config fetch (startup fast-path before stream establishes)
  rpc GetConfig(GetConfigRequest) returns (ConfigSnapshot);

  // Admin: set or update a config value
  rpc SetConfig(SetConfigRequest) returns (SetConfigResponse);

  // Admin: list all keys for a namespace
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);
}

message WatchConfigRequest {
  string namespace = 1;   // e.g. "indicators", "trading", "platform"
  string client_id = 2;   // service instance identifier
  string version = 3;     // last known version (for delta updates)
  xstockstrat.common.v1.Environment environment = 4;    // dev or production; defaults to dev
  xstockstrat.common.v1.TradingMode trading_mode = 5;   // paper or live; 'all' rows included always
}

message ConfigSnapshot {
  string namespace = 1;
  string version = 2;
  google.protobuf.Timestamp updated_at = 3;
  map<string, ConfigValue> values = 4;
  ConfigUpdateType update_type = 5;
  repeated string changed_keys = 6; // populated for DELTA updates
  xstockstrat.common.v1.Environment environment = 7;
  xstockstrat.common.v1.TradingMode trading_mode = 8;
}

message ConfigValue {
  oneof value {
    string string_val = 1;
    int64 int_val = 2;
    double float_val = 3;
    bool bool_val = 4;
    google.protobuf.Struct json_val = 5;
  }
  bool is_secret = 6;       // true = value is redacted; resolved at runtime
  string description = 7;
  string default_value = 8;
}

enum ConfigUpdateType {
  CONFIG_UPDATE_TYPE_UNSPECIFIED = 0;
  CONFIG_UPDATE_TYPE_SNAPSHOT = 1;  // full config dump
  CONFIG_UPDATE_TYPE_DELTA = 2;     // only changed_keys changed
  CONFIG_UPDATE_TYPE_RELOAD = 3;    // force full reload signal
}

enum ValueType {
  VALUE_TYPE_UNSPECIFIED = 0;
  VALUE_TYPE_FLOAT_MAP = 1;
}

// Validation constraints declared by the config service for a key.
// When value_type == VALUE_TYPE_FLOAT_MAP, every numeric leaf in the JSON value
// must satisfy [min_value, max_value]. Absent or VALUE_TYPE_UNSPECIFIED = no validation.
message ValidationRule {
  ValueType value_type = 1;
  float min_value = 2;
  float max_value = 3;
}

message GetConfigRequest {
  string namespace = 1;
  xstockstrat.common.v1.Environment environment = 2;
  xstockstrat.common.v1.TradingMode trading_mode = 3;
}

message SetConfigRequest {
  string namespace = 1;
  string key = 2;
  ConfigValue value = 3;
  string author = 4;
  string reason = 5;
  xstockstrat.common.v1.Environment environment = 6;
  xstockstrat.common.v1.TradingMode trading_mode = 7;
}

message SetConfigResponse {
  string version = 1;
  google.protobuf.Timestamp updated_at = 2;
}

message ListKeysRequest {
  string namespace = 1;
  xstockstrat.common.v1.Environment environment = 2;
  xstockstrat.common.v1.TradingMode trading_mode = 3;
}

message ListKeysResponse {
  repeated ConfigKeyMeta keys = 1;
}

message ConfigKeyMeta {
  string key = 1;
  string description = 2;
  string default_value = 3;
  bool is_secret = 4;
  string consuming_service = 5;
  xstockstrat.common.v1.Environment environment = 6;
  xstockstrat.common.v1.TradingMode trading_mode = 7;
  ValidationRule validation = 8;  // optional; absent = no validation
}
