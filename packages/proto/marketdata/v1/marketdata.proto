syntax = "proto3";

package xstockstrat.marketdata.v1;

option go_package = "github.com/xstockstrat/contracts/gen/go/marketdata/v1;marketdatav1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

// MarketDataService — sole Alpaca integration point.
// Stores OHLCV and quote data in TimescaleDB hypertables.
service MarketDataService {
  // Stream live bar data for symbols
  rpc StreamBars(StreamBarsRequest) returns (stream Bar);

  // Stream live quotes
  rpc StreamQuotes(StreamQuotesRequest) returns (stream Quote);

  // Historical OHLCV query
  rpc GetBars(GetBarsRequest) returns (GetBarsResponse);

  // Latest quote snapshot
  rpc GetLatestQuote(GetLatestQuoteRequest) returns (Quote);

  // Trigger historical backfill (used by xstockstrat-ingest)
  rpc BackfillBars(BackfillBarsRequest) returns (BackfillBarsResponse);

  // Report stored OHLCV coverage (earliest/latest/count + gaps) for a symbol+timeframe
  rpc GetDataCoverage(GetDataCoverageRequest) returns (GetDataCoverageResponse);

  // Scoped delete of backfilled OHLCV bars (admin-only, symbol-bounded — FR-5)
  rpc DeleteBackfilledData(DeleteBackfilledDataRequest) returns (DeleteBackfilledDataResponse);

  // Get available symbols
  rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse);

  // Cached fundamental metrics for one symbol (FMP-backed, read-through DB cache)
  rpc GetFundamentals(GetFundamentalsRequest) returns (GetFundamentalsResponse);

  // Batched fundamentals for a watchlist scan (core metrics via one FMP quote call)
  rpc GetFundamentalsMulti(GetFundamentalsMultiRequest) returns (GetFundamentalsMultiResponse);
}

message Bar {
  string symbol = 1;
  google.protobuf.Timestamp time = 2;
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  int64 volume = 7;
  double vwap = 8;
  int32 trade_count = 9;
  // DEPRECATED: use timeframe_enum. Removed in a future release once all callers migrate.
  string timeframe = 10 [deprecated = true];  // "15m", "1h", "1d"
  string source = 11;     // always "alpaca" for this service
  xstockstrat.common.v1.Timeframe timeframe_enum = 12;
}

message Quote {
  string symbol = 1;
  google.protobuf.Timestamp time = 2;
  double ask_price = 3;
  int32 ask_size = 4;
  double bid_price = 5;
  int32 bid_size = 6;
  string source = 7;
}

message StreamBarsRequest {
  repeated string symbols = 1;
  // DEPRECATED: use timeframe_enum. Removed in a future release once all callers migrate.
  string timeframe = 2 [deprecated = true];   // "15m", "1h", "1d"
  bool include_premarket = 3;
  bool include_afterhours = 4;
  xstockstrat.common.v1.Timeframe timeframe_enum = 5;
}

message StreamQuotesRequest {
  repeated string symbols = 1;
}

message GetBarsRequest {
  string symbol = 1;
  // DEPRECATED: use timeframe_enum. Removed in a future release once all callers migrate.
  string timeframe = 2 [deprecated = true];
  xstockstrat.common.v1.TimeRange range = 3;
  xstockstrat.common.v1.PageRequest page = 4;
  xstockstrat.common.v1.Timeframe timeframe_enum = 5;
}

message GetBarsResponse {
  repeated Bar bars = 1;
  xstockstrat.common.v1.PageResponse page = 2;
}

message GetLatestQuoteRequest {
  string symbol = 1;
}

message BackfillBarsRequest {
  repeated string symbols = 1;
  // DEPRECATED: use timeframe_enum. Removed in a future release once all callers migrate.
  string timeframe = 2 [deprecated = true];
  xstockstrat.common.v1.TimeRange range = 3;
  bool overwrite_existing = 4;
  xstockstrat.common.v1.Timeframe timeframe_enum = 5;
}

message BackfillBarsResponse {
  int64 bars_written = 1;
  repeated string failed_symbols = 2;
  int64 expected_bars = 3; // estimated total bars across requested symbols/range (FR-6)
}

message GetDataCoverageRequest {
  string symbol = 1;
  xstockstrat.common.v1.Timeframe timeframe = 2;
  // Optional: restrict the coverage scan to this window. Empty = full history.
  xstockstrat.common.v1.TimeRange range = 3;
}

message CoverageRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
  int64 bar_count = 3;
}

message GetDataCoverageResponse {
  string symbol = 1;
  xstockstrat.common.v1.Timeframe timeframe = 2;
  int64 bars_total = 3;
  // Covered earliest/latest with total bar count; covered_ranges holds contiguous segments,
  // gaps holds the missing segments within the requested range (if range was supplied).
  google.protobuf.Timestamp earliest = 4;
  google.protobuf.Timestamp latest = 5;
  repeated CoverageRange covered_ranges = 6;
  repeated xstockstrat.common.v1.TimeRange gaps = 7;
}

message ListAssetsRequest {
  string asset_class = 1;  // optional: "us_equity", "crypto"
  bool tradable_only = 2;
}

message ListAssetsResponse {
  repeated xstockstrat.common.v1.Asset assets = 1;
}

message DeleteBackfilledDataRequest {
  string symbol = 1;                              // REQUIRED — server rejects empty (FR-5)
  xstockstrat.common.v1.TimeRange range = 2;      // optional; empty = whole symbol
  xstockstrat.common.v1.Timeframe timeframe = 3;  // optional; UNSPECIFIED = all timeframes
}

message DeleteBackfilledDataResponse {
  int64 rows_deleted = 1;
}

// Fundamentals (feature 059) — cached fundamental metrics for a symbol, FMP-backed.
message Fundamentals {
  string symbol = 1;
  double market_cap = 2;
  double pe_ratio = 3;
  double pb_ratio = 4;
  double dividend_yield = 5;
  double eps = 6;
  double beta = 7;
  double roe = 8;
  double debt_to_equity = 9;
  double price = 10;
  double year_high = 11;
  double year_low = 12;
  // FMP's open-ended metric set (keys are FMP field names)
  map<string, double> extra_metrics = 13;
  google.protobuf.Timestamp as_of = 14;
  string currency = 15;
  string source = 16;   // "fmp"
  bool stale = 17;      // true when served past TTL under quota exhaustion (FR-4)
}

message GetFundamentalsRequest {
  string symbol = 1;
}

message GetFundamentalsResponse {
  Fundamentals fundamentals = 1;
}

message GetFundamentalsMultiRequest {
  repeated string symbols = 1;
}

message GetFundamentalsMultiResponse {
  repeated Fundamentals fundamentals = 1;
}
