name: Deploy prod

on:
  push:
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  buf-push:
    name: Publish proto definitions to BSR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: bufbuild/buf-push-action@v1
        with:
          input: packages/proto
          buf_token: ${{ secrets.BUF_TOKEN }}

  deploy:
    name: Deploy to prod
    needs: [prepare]
    uses: ./.github/workflows/deploy.yml
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_APP_ID: ${{ secrets.DO_PROD_APP_ID }}
      DO_PROJECT_ID: ${{ secrets.DO_PROD_PROJECT_ID }}
      DO_REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}
    with:
      app_spec: .do/app.yaml
      image_tag: ${{ needs.prepare.outputs.short_sha }}
