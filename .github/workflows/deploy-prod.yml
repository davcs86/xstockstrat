name: Deploy prod

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform
        run: doctl apps update ${{ secrets.DO_PROD_APP_ID }} --spec .do/app.yaml

      - name: Wait for deployment
        run: |
          APP_ID="${{ secrets.DO_PROD_APP_ID }}"
          DEPLOY_ID=$(doctl apps list-deployments "$APP_ID" --format ID --no-header | head -1)
          echo "Waiting for deployment $DEPLOY_ID ..."
          for i in $(seq 1 60); do
            PHASE=$(doctl apps get-deployment "$APP_ID" "$DEPLOY_ID" --format Phase --no-header)
            echo "  [$i/60] Phase: $PHASE"
            if [ "$PHASE" = "ACTIVE" ]; then
              echo "Deployment succeeded."
              exit 0
            elif [ "$PHASE" = "ERROR" ] || [ "$PHASE" = "CANCELED" ]; then
              echo "Deployment failed with phase: $PHASE"
              exit 1
            fi
            sleep 15
          done
          echo "Timeout: deployment did not complete within 15 minutes."
          exit 1
