name: Docker build and push (reusable)

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Short SHA tag for images'
        required: true
        type: string
      latest_tag:
        description: 'Floating tag (latest-dev or latest)'
        required: true
        type: string
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        required: true
      DO_REGISTRY_NAME:
        required: true

jobs:
  build:
    name: Build (${{ matrix.service }})${{ matrix.push && ' → DOCR' || matrix.ghcr_push && ' → GHCR' || '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build + push to GHCR — DO builds these from source via github: in the
          # app spec so they don't consume a DOCR slot; GHCR makes them pullable
          # for local dev without DO credentials.
          - service: xstockstrat-trading
            dockerfile: services/xstockstrat-trading/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-portfolio
            dockerfile: services/xstockstrat-portfolio/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-marketdata
            dockerfile: services/xstockstrat-marketdata/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-indicators
            dockerfile: services/xstockstrat-indicators/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-ingest
            dockerfile: services/xstockstrat-ingest/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-analysis
            dockerfile: services/xstockstrat-analysis/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-agent
            dockerfile: services/xstockstrat-agent/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-ledger
            dockerfile: services/xstockstrat-ledger/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-config
            dockerfile: services/xstockstrat-config/Dockerfile
            push: false
            ghcr_push: true
          - service: xstockstrat-nginx
            dockerfile: services/xstockstrat-nginx/Dockerfile
            push: false
            ghcr_push: true
          # Build + push to DOCR — referenced as image: in app specs.
          - service: xstockstrat-identity
            dockerfile: services/xstockstrat-identity/Dockerfile
            push: true
            ghcr_push: false
          - service: xstockstrat-notify
            dockerfile: services/xstockstrat-notify/Dockerfile
            push: true
            ghcr_push: false
          - service: xstockstrat-trader
            dockerfile: services/xstockstrat-trader/Dockerfile
            push: true
            ghcr_push: false
          - service: xstockstrat-insights
            dockerfile: services/xstockstrat-insights/Dockerfile
            push: true
            ghcr_push: false
          - service: xstockstrat-config-ui
            dockerfile: services/xstockstrat-config-ui/Dockerfile
            push: true
            ghcr_push: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        if: ${{ matrix.push }}
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        if: ${{ matrix.push }}
        run: doctl registry login --expiry-seconds 3600

      - name: Log in to GHCR
        if: ${{ matrix.ghcr_push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        if: ${{ matrix.push || matrix.ghcr_push }}
        run: |
          TAGS=""
          if [ "${{ matrix.push }}" = "true" ]; then
            REPO="registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/${{ matrix.service }}"
            TAGS="${REPO}:${{ inputs.image_tag }},${REPO}:${{ inputs.latest_tag }}"
          fi
          if [ "${{ matrix.ghcr_push }}" = "true" ]; then
            REPO="ghcr.io/davcs86/xstockstrat/${{ matrix.service }}"
            GHCR_TAGS="${REPO}:${{ inputs.image_tag }},${REPO}:${{ inputs.latest_tag }}"
            TAGS="${TAGS:+${TAGS},}${GHCR_TAGS}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ matrix.push || matrix.ghcr_push }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64
