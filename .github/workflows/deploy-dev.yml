name: Deploy dev

on:
  push:
    branches:
      - main-dev

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  buf-push-dev:
    name: Publish proto definitions to BSR (dev draft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: bufbuild/buf-push-action@v1
        with:
          input: packages/proto
          buf_token: ${{ secrets.BUF_TOKEN }}
          draft: true

  build-images:
    name: Build and push Docker images
    needs: [prepare]
    uses: ./.github/workflows/docker-build.yml
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}
    with:
      image_tag: ${{ needs.prepare.outputs.short_sha }}
      latest_tag: latest-dev

  deploy:
    name: Deploy to dev
    needs: [prepare, build-images]
    uses: ./.github/workflows/deploy.yml
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_APP_ID: ${{ secrets.DO_DEV_APP_ID }}
      DO_PROJECT_ID: ${{ secrets.DO_DEV_PROJECT_ID }}
      DO_REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}
      BROKER_ACCOUNTS_ENCRYPTION_KEY: ${{ secrets.DEV_BROKER_ACCOUNTS_ENCRYPTION_KEY }}
    with:
      app_spec: .do/app.dev.yaml
      image_tag: ${{ needs.prepare.outputs.short_sha }}
