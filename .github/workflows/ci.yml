name: CI

on:
  pull_request:
  push:
    branches:
      - main-dev
      - main

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    # Scoped to this job only. A workflow-level `permissions:` block sets
    # every unlisted scope to `none` for ALL jobs, which silently strips
    # write scopes that other actions (golangci-lint annotations, gitleaks
    # PR comments, actions/cache writes) need. paths-filter is the only
    # action here that calls the GitHub API, so grant pull-requests:read
    # locally and let every other job inherit the repo default.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      matched: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Each filter name is referenced verbatim by downstream `if:` gates.
          # Service filter names MUST match the matrix.service values exactly.
          # paths-filter@v3 emits a default `changes` output: a JSON array of
          # filter names that matched. That array is what downstream jobs read
          # via needs.changes.outputs.matched — no extra jq step required.
          filters: |
            ci:
              - '.github/workflows/ci.yml'
            proto:
              - 'packages/proto/**'
              - 'scripts/buf-gen.sh'
            go-shared:
              - 'go.work'
              - 'go.work.sum'
            node-shared:
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
            xstockstrat-trading:    ['services/xstockstrat-trading/**']
            xstockstrat-marketdata: ['services/xstockstrat-marketdata/**']
            xstockstrat-portfolio:  ['services/xstockstrat-portfolio/**']
            xstockstrat-indicators: ['services/xstockstrat-indicators/**']
            xstockstrat-ingest:     ['services/xstockstrat-ingest/**']
            xstockstrat-analysis:   ['services/xstockstrat-analysis/**']
            xstockstrat-config:     ['services/xstockstrat-config/**']
            xstockstrat-ledger:     ['services/xstockstrat-ledger/**']
            xstockstrat-identity:   ['services/xstockstrat-identity/**']
            xstockstrat-notify:     ['services/xstockstrat-notify/**']
            xstockstrat-trader:     ['services/xstockstrat-trader/**']
            xstockstrat-insights:   ['services/xstockstrat-insights/**']
            xstockstrat-config-ui:  ['services/xstockstrat-config-ui/**']
            xstockstrat-nginx:      ['services/xstockstrat-nginx/**', 'nginx.conf']
            dockerfiles:
              - '**/Dockerfile*'
              - '.hadolint.yaml'
            scripts:
              - 'scripts/**'
              - '.claude/hooks/**'
            claude-md:
              - '**/CLAUDE.md'
              - '.markdownlint.yaml'

      - name: Print matched filters
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref:   ${{ github.ref }}"
          echo "SHA:   ${{ github.sha }}"
          echo "Matched filters: ${{ steps.filter.outputs.changes }}"

  proto-lint:
    name: Proto lint and breaking check
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history required for buf breaking against the target branch
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.69.0'

      - name: buf lint
        run: buf lint packages/proto/

      - name: buf breaking (against target branch)
        working-directory: packages/proto
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            AGAINST="../../.git#branch=origin/${{ github.base_ref }},subdir=packages/proto"
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "Initial push — no prior ref to compare against, skipping"
              exit 0
            fi
            AGAINST="../../.git#ref=${BEFORE},subdir=packages/proto"
          fi
          echo "Checking breaking changes against ${AGAINST}"
          buf breaking . --against "${AGAINST}"

  proto-freshness:
    name: Proto stubs are up to date
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.69.0'

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: packages/proto/go.sum

      - name: Install Go proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Python gRPC tools
        run: pip install grpcio-tools==1.80.0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate stubs
        run: bash ./scripts/buf-gen.sh

      - name: Check for stale stubs
        run: |
          git diff --exit-code packages/proto/gen/ || \
          (echo "Committed stubs are stale — run ./scripts/buf-gen.sh and commit the result" && exit 1)

  go-lint:
    name: Go lint and test (${{ matrix.service }})
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), matrix.service) ||
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'go-shared') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-trading
            coverage_threshold: 40
          - service: xstockstrat-marketdata
            coverage_threshold: 40
          - service: xstockstrat-portfolio
            coverage_threshold: 40
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: go mod download
        run: go mod download
        env:
          GOWORK: "off"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          working-directory: services/${{ matrix.service }}
          args: --modules-download-mode=mod
        env:
          GOWORK: "off"

      - name: go test with coverage
        run: |
          # Exclude infrastructure packages from coverage measurement:
          #   cmd        — entry point, not unit-testable
          #   handler    — gRPC/HTTP transport layer, requires integration setup
          #   repository — database layer, requires a live DB
          #   telemetry  — observability plumbing
          #   service    — business logic that depends on gRPC clients/DB; only
          #                pure helper functions are unit-tested, making overall
          #                service coverage misleadingly low; service logic is
          #                covered by integration tests.
          # Only config and broker/alpaca packages contain fully unit-testable
          # pure logic and are included in the threshold check.
          COVERPKGS=$(go list ./... | grep -Ev '/(cmd|handler|repository|telemetry|service)(/|$)' | tr '\n' ',' | sed 's/,$//')
          go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic -coverpkg="${COVERPKGS}"
        env:
          GOWORK: "off"

      - name: coverage report
        run: go tool cover -func=coverage.out

      - name: enforce coverage threshold
        run: |
          THRESHOLD=${{ matrix.coverage_threshold }}
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%  Threshold: ${THRESHOLD}%"
          python3 -c "
          import sys
          c = float('${COVERAGE}')
          t = float('${THRESHOLD}')
          if c >= t:
              print(f'OK: {c:.1f}% >= {t}%')
          else:
              print(f'FAIL: {c:.1f}% < {t}%')
              sys.exit(1)
          "

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.out
          if-no-files-found: ignore

  python-lint:
    name: Python lint (${{ matrix.service }})
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), matrix.service) ||
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - xstockstrat-indicators
          - xstockstrat-ingest
          - xstockstrat-analysis
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  python-test:
    name: Python test and coverage (${{ matrix.service }})
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), matrix.service) ||
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-indicators
            coverage_threshold: 50
            cov_source: app
          - service: xstockstrat-ingest
            coverage_threshold: 40
            cov_source: app
          - service: xstockstrat-analysis
            coverage_threshold: 40
            cov_source: app
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: install dependencies
        run: pip install -e ".[dev]"

      - name: pytest with coverage
        run: |
          pytest --cov=${{ matrix.cov_source }} \
                 --cov-report=xml:coverage.xml \
                 --cov-report=term-missing \
                 --cov-fail-under=${{ matrix.coverage_threshold }}

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          if-no-files-found: ignore

  node-lint:
    name: Node lint (${{ matrix.service }})
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), matrix.service) ||
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'node-shared') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - xstockstrat-config
          - xstockstrat-ledger
          - xstockstrat-identity
          - xstockstrat-notify
          - xstockstrat-trader
          - xstockstrat-insights
          - xstockstrat-config-ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: build proto stubs
        run: pnpm --filter @xstockstrat/proto run build

      - name: lint
        working-directory: services/${{ matrix.service }}
        run: pnpm run lint

  frontend-e2e:
    name: Frontend E2E (${{ matrix.service }})
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), matrix.service) ||
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'node-shared') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-trader
          - service: xstockstrat-insights
          - service: xstockstrat-config-ui
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: get playwright version
        id: pw-version
        run: echo "version=$(pnpm list @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: install playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium firefox

      - name: install playwright system dependencies
        run: pnpm exec playwright install-deps chromium firefox

      - name: run e2e tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.service }}
          path: services/${{ matrix.service }}/playwright-report/
          retention-days: 7

  node-test:
    name: Node test and coverage (${{ matrix.service }})
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), matrix.service) ||
      contains(fromJson(needs.changes.outputs.matched), 'proto') ||
      contains(fromJson(needs.changes.outputs.matched), 'node-shared') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-config
            coverage_threshold: 40
          - service: xstockstrat-ledger
            coverage_threshold: 40
          - service: xstockstrat-identity
            coverage_threshold: 40
          - service: xstockstrat-notify
            coverage_threshold: 40
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: build proto stubs
        run: pnpm --filter @xstockstrat/proto run build

      - name: test with coverage
        working-directory: services/${{ matrix.service }}
        run: pnpm run test:coverage

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/lcov.info
          if-no-files-found: ignore

  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), 'dockerfiles') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: .hadolint.yaml

  docker-build:
    name: Docker build and push (${{ matrix.service }})
    needs: changes
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main-dev' ||
      github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-trading
            dockerfile: services/xstockstrat-trading/Dockerfile
          - service: xstockstrat-portfolio
            dockerfile: services/xstockstrat-portfolio/Dockerfile
          - service: xstockstrat-marketdata
            dockerfile: services/xstockstrat-marketdata/Dockerfile
          - service: xstockstrat-indicators
            dockerfile: services/xstockstrat-indicators/Dockerfile
          - service: xstockstrat-ingest
            dockerfile: services/xstockstrat-ingest/Dockerfile
          - service: xstockstrat-analysis
            dockerfile: services/xstockstrat-analysis/Dockerfile
          - service: xstockstrat-agent
            dockerfile: services/xstockstrat-agent/Dockerfile
          - service: xstockstrat-ledger
            dockerfile: services/xstockstrat-ledger/Dockerfile
          - service: xstockstrat-identity
            dockerfile: services/xstockstrat-identity/Dockerfile
          - service: xstockstrat-notify
            dockerfile: services/xstockstrat-notify/Dockerfile
          - service: xstockstrat-config
            dockerfile: services/xstockstrat-config/Dockerfile
          - service: xstockstrat-nginx
            dockerfile: services/xstockstrat-nginx/Dockerfile
          - service: xstockstrat-trader
            dockerfile: services/xstockstrat-trader/Dockerfile
          - service: xstockstrat-insights
            dockerfile: services/xstockstrat-insights/Dockerfile
          - service: xstockstrat-config-ui
            dockerfile: services/xstockstrat-config-ui/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 3600

      - name: Determine tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          REGISTRY="registry.digitalocean.com"
          REGISTRY_SLUG="${{ secrets.DO_REGISTRY_NAME }}"
          REPO="${REGISTRY}/${REGISTRY_SLUG}/${{ matrix.service }}"
          if [ "${{ github.ref }}" = "refs/heads/main-dev" ]; then
            echo "tags=${REPO}:${SHORT_SHA},${REPO}:latest-dev" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REPO}:${SHORT_SHA},${REPO}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

  shell-lint:
    name: Shell script lint (shellcheck + shfmt)
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), 'scripts') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck and shfmt
        run: sudo apt-get install -y shellcheck shfmt

      - name: shellcheck
        run: shellcheck scripts/*.sh .claude/hooks/*.sh

      - name: shfmt (diff check)
        run: shfmt -d -i 2 scripts/*.sh .claude/hooks/*.sh

  markdown-lint:
    name: CLAUDE.md lint (markdownlint)
    needs: changes
    if: >-
      contains(fromJson(needs.changes.outputs.matched), 'claude-md') ||
      contains(fromJson(needs.changes.outputs.matched), 'ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: .markdownlint.yaml
          globs: '**/CLAUDE.md'

  secret-scan:
    name: Secret scan (trufflehog + gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history required for trufflehog git-history scan
          fetch-depth: 0

      - name: TruffleHog — scan git history
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_SCAN }}

      - name: Gitleaks — scan working tree
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_SCAN }}
