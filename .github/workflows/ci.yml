name: CI

on:
  pull_request:
    branches:
      - main-dev
      - main

jobs:
  proto-lint:
    name: Proto lint and breaking check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history required for buf breaking against the target branch
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1

      - name: buf lint
        run: buf lint packages/proto/

      - name: buf breaking (against target branch)
        working-directory: packages/proto
        run: |
          BASE="${{ github.base_ref }}"
          echo "Checking breaking changes against origin/${BASE}"
          buf breaking . --against "../../.git#branch=origin/${BASE},subdir=packages/proto"

  proto-freshness:
    name: Proto stubs are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Go proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Regenerate stubs
        run: bash ./scripts/buf-gen.sh

      - name: Check for stale stubs
        run: |
          git diff --exit-code packages/proto/gen/ || \
          (echo "Committed stubs are stale — run ./scripts/buf-gen.sh and commit the result" && exit 1)

  go-lint:
    name: Go lint and test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-trading
            coverage_threshold: 40
          - service: xstockstrat-marketdata
            coverage_threshold: 40
          - service: xstockstrat-portfolio
            coverage_threshold: 40
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: go mod download
        run: go mod download
        env:
          GOWORK: "off"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: services/${{ matrix.service }}
          args: --modules-download-mode=mod
        env:
          GOWORK: "off"

      - name: go test with coverage
        run: |
          # Exclude infrastructure packages from coverage measurement:
          #   cmd        — entry point, not unit-testable
          #   handler    — gRPC/HTTP transport layer, requires integration setup
          #   repository — database layer, requires a live DB
          #   telemetry  — observability plumbing
          #   service    — business logic that depends on gRPC clients/DB; only
          #                pure helper functions are unit-tested, making overall
          #                service coverage misleadingly low; service logic is
          #                covered by integration tests.
          # Only config and broker/alpaca packages contain fully unit-testable
          # pure logic and are included in the threshold check.
          COVERPKGS=$(go list ./... | grep -Ev '/(cmd|handler|repository|telemetry|service)(/|$)' | tr '\n' ',' | sed 's/,$//')
          go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic -coverpkg="${COVERPKGS}"
        env:
          GOWORK: "off"

      - name: coverage report
        run: go tool cover -func=coverage.out

      - name: enforce coverage threshold
        run: |
          THRESHOLD=${{ matrix.coverage_threshold }}
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%  Threshold: ${THRESHOLD}%"
          python3 -c "
          import sys
          c = float('${COVERAGE}')
          t = float('${THRESHOLD}')
          if c >= t:
              print(f'OK: {c:.1f}% >= {t}%')
          else:
              print(f'FAIL: {c:.1f}% < {t}%')
              sys.exit(1)
          "

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.out
          if-no-files-found: ignore

  python-lint:
    name: Python lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - xstockstrat-indicators
          - xstockstrat-ingest
          - xstockstrat-analysis
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  python-test:
    name: Python test and coverage (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-indicators
            coverage_threshold: 50
            cov_source: app
          - service: xstockstrat-ingest
            coverage_threshold: 40
            cov_source: app
          - service: xstockstrat-analysis
            coverage_threshold: 40
            cov_source: app
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/pyproject.toml

      - name: install dependencies
        run: pip install -e ".[dev]"

      - name: pytest with coverage
        run: |
          pytest --cov=${{ matrix.cov_source }} \
                 --cov-report=xml:coverage.xml \
                 --cov-report=term-missing \
                 --cov-fail-under=${{ matrix.coverage_threshold }}

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          if-no-files-found: ignore

  node-lint:
    name: Node lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - xstockstrat-config
          - xstockstrat-ledger
          - xstockstrat-identity
          - xstockstrat-notify
          - xstockstrat-trader
          - xstockstrat-insights
          - xstockstrat-config-ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: build proto stubs
        run: pnpm --filter @xstockstrat/proto run build

      - name: lint
        working-directory: services/${{ matrix.service }}
        run: pnpm run lint

  frontend-e2e:
    name: Frontend E2E (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-trader
          - service: xstockstrat-insights
          - service: xstockstrat-config-ui
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: services/${{ matrix.service }}/pnpm-lock.yaml

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: get playwright version
        id: pw-version
        run: echo "version=$(pnpm list @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: install playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium firefox

      - name: install playwright system dependencies
        run: pnpm exec playwright install-deps chromium firefox

      - name: run e2e tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.service }}
          path: services/${{ matrix.service }}/playwright-report/
          retention-days: 7

  node-test:
    name: Node test and coverage (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xstockstrat-config
            coverage_threshold: 40
          - service: xstockstrat-ledger
            coverage_threshold: 40
          - service: xstockstrat-identity
            coverage_threshold: 40
          - service: xstockstrat-notify
            coverage_threshold: 40
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: build proto stubs
        run: pnpm --filter @xstockstrat/proto run build

      - name: test with coverage
        working-directory: services/${{ matrix.service }}
        run: pnpm run test:coverage

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/lcov.info
          if-no-files-found: ignore
