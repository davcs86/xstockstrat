name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      app_spec:
        description: 'Path to the DO app spec file'
        required: true
        type: string
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        required: true
      DO_APP_ID:
        required: true
      DO_PROJECT_ID:
        required: false  # Set DO_DEV_PROJECT_ID / DO_PROD_PROJECT_ID in GitHub Secrets.
                         # Find your project ID: doctl projects list
                         # Without this the app lands in the account's default project.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Substitute GitHub org in app spec
        run: sed "s|YOUR_GITHUB_ORG|${{ github.repository_owner }}|g" ${{ inputs.app_spec }} > /tmp/app_spec_substituted.yaml

      - name: Deploy to DigitalOcean App Platform
        run: doctl apps update ${{ secrets.DO_APP_ID }} --spec /tmp/app_spec_substituted.yaml

      - name: Assign app to DO project
        env:
          DO_PROJECT_ID: ${{ secrets.DO_PROJECT_ID }}
        run: |
          if [ -n "$DO_PROJECT_ID" ]; then
            echo "Assigning app to project $DO_PROJECT_ID ..."
            doctl projects resources assign "$DO_PROJECT_ID" \
              --resource "do:app:${{ secrets.DO_APP_ID }}"
          else
            echo "DO_PROJECT_ID not set — app stays in default project."
          fi

      - name: Wait for deployment
        run: |
          APP_ID="${{ secrets.DO_APP_ID }}"
          DEPLOY_ID=$(doctl apps list-deployments "$APP_ID" --format ID --no-header | head -1)
          echo "Waiting for deployment $DEPLOY_ID ..."
          for i in $(seq 1 60); do
            PHASE=$(doctl apps get-deployment "$APP_ID" "$DEPLOY_ID" --format Phase --no-header)
            echo "  [$i/60] Phase: $PHASE"
            if [ "$PHASE" = "ACTIVE" ]; then
              echo "Deployment succeeded."
              exit 0
            elif [ "$PHASE" = "ERROR" ] || [ "$PHASE" = "CANCELED" ]; then
              echo "Deployment failed with phase: $PHASE"
              exit 1
            fi
            sleep 15
          done
          echo "Timeout: deployment did not complete within 15 minutes."
          exit 1
