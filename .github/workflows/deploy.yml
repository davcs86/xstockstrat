name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      app_spec:
        description: 'Path to the DO app spec file'
        required: true
        type: string
      image_tag:
        description: 'Short SHA to inject as YOUR_IMAGE_TAG in the app spec'
        required: true
        type: string
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        required: true
      DO_APP_ID:
        required: true
      DO_PROJECT_ID:
        required: false  # Set DO_DEV_PROJECT_ID / DO_PROD_PROJECT_ID in GitHub Secrets.
                         # Find your project ID: doctl projects list
                         # Without this the app lands in the account's default project.
      BROKER_ACCOUNTS_ENCRYPTION_KEY:
        required: true
        # Callers pass DEV_BROKER_ACCOUNTS_ENCRYPTION_KEY or PROD_BROKER_ACCOUNTS_ENCRYPTION_KEY
        # from GitHub Secrets into this unified parameter.
      JWT_SECRET:
        required: true
        # Callers pass DEV_JWT_SECRET or PROD_JWT_SECRET from GitHub Secrets.
      ALPACA_API_KEY:
        required: true
        # Callers pass DEV_ALPACA_API_KEY (paper) or PROD_ALPACA_API_KEY (live) from GitHub Secrets.
      ALPACA_API_SECRET:
        required: true
        # Callers pass DEV_ALPACA_API_SECRET (paper) or PROD_ALPACA_API_SECRET (live) from GitHub Secrets.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Substitute app spec placeholders
        env:
          BROKER_ACCOUNTS_ENCRYPTION_KEY: ${{ secrets.BROKER_ACCOUNTS_ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          sed \
            -e "s|YOUR_GITHUB_ORG|${{ github.repository_owner }}|g" \
            -e "s|YOUR_IMAGE_TAG|${{ inputs.image_tag }}|g" \
            ${{ inputs.app_spec }} \
          | BROKER_ACCOUNTS_ENCRYPTION_KEY="$BROKER_ACCOUNTS_ENCRYPTION_KEY" \
            JWT_SECRET="$JWT_SECRET" \
            ALPACA_API_KEY="$ALPACA_API_KEY" \
            ALPACA_API_SECRET="$ALPACA_API_SECRET" \
            python3 -c "
          import os, sys
          content = sys.stdin.read()
          key = os.environ['BROKER_ACCOUNTS_ENCRYPTION_KEY']
          content = content.replace('YOUR_DEV_BROKER_ACCOUNTS_ENCRYPTION_KEY', key)
          content = content.replace('YOUR_PROD_BROKER_ACCOUNTS_ENCRYPTION_KEY', key)
          jwt = os.environ['JWT_SECRET']
          content = content.replace('YOUR_DEV_JWT_SECRET', jwt)
          content = content.replace('YOUR_PROD_JWT_SECRET', jwt)
          alpaca_key = os.environ['ALPACA_API_KEY']
          content = content.replace('YOUR_DEV_ALPACA_API_KEY', alpaca_key)
          content = content.replace('YOUR_PROD_ALPACA_API_KEY', alpaca_key)
          alpaca_secret = os.environ['ALPACA_API_SECRET']
          content = content.replace('YOUR_DEV_ALPACA_API_SECRET', alpaca_secret)
          content = content.replace('YOUR_PROD_ALPACA_API_SECRET', alpaca_secret)
          sys.stdout.write(content)
          " > /tmp/app_spec_substituted.yaml

      - name: Deploy to DigitalOcean App Platform
        # --update-sources forces DO to re-evaluate the branch and build from the
        # current HEAD instead of the pinned commit stored from the last deploy.
        run: doctl apps update ${{ secrets.DO_APP_ID }} --spec /tmp/app_spec_substituted.yaml --update-sources

      - name: Assign app to DO project
        env:
          DO_PROJECT_ID: ${{ secrets.DO_PROJECT_ID }}
        run: |
          if [ -n "$DO_PROJECT_ID" ]; then
            echo "Assigning app to project $DO_PROJECT_ID ..."
            doctl projects resources assign "$DO_PROJECT_ID" \
              --resource "do:app:${{ secrets.DO_APP_ID }}"
          else
            echo "DO_PROJECT_ID not set — app stays in default project."
          fi

      - name: Wait for deployment
        run: |
          APP_ID="${{ secrets.DO_APP_ID }}"
          DEPLOY_ID=$(doctl apps list-deployments "$APP_ID" --format ID --no-header | head -1)
          echo "Waiting for deployment $DEPLOY_ID ..."
          for i in $(seq 1 60); do
            PHASE=$(doctl apps get-deployment "$APP_ID" "$DEPLOY_ID" --format Phase --no-header)
            echo "  [$i/60] Phase: $PHASE"
            if [ "$PHASE" = "ACTIVE" ]; then
              echo "Deployment succeeded."
              exit 0
            elif [ "$PHASE" = "ERROR" ] || [ "$PHASE" = "CANCELED" ]; then
              echo "Deployment failed with phase: $PHASE"
              exit 1
            fi
            sleep 15
          done
          echo "Timeout: deployment did not complete within 15 minutes."
          exit 1
